    #modal {

    .form-group      { display: flex; flex-direction: column; gap: 4px; }
    .form-group label { font-size: 12px; font-weight: bold; color: #555; text-transform: uppercase; letter-spacing: .4px; }
    .form-group input, .form-group select, .form-group textarea {

      border-radius: 6px; font-size: 13px; font-family: inherit;

    .form-group textarea { resize: vertical; min-height: 60px; }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus {

      font-size: 13px; opacity: 0; transition: opacity .3s; pointer-events: none; z-index: 200;
    }
    #toast.show { opacity: 1; }
  </style>

<script>
// ── State ─────────────────────────────────────────────────────────────────────

let boxers     = [];
let filtered   = [];
let fileHandle = null;
let editingId  = null;
let sortCol    = 'id';
let sortDir    = 1;

// ── CSV helpers ───────────────────────────────────────────────────────────────

function splitCSVLine(line) {
  const cols = [];
  let cur = '', inQ = false;
  for (let i = 0; i < line.length; i++) {
    const c = line[i];
    if (c === '"') {
      if (inQ && line[i + 1] === '"') { cur += '"'; i++; }
      else inQ = !inQ;
    } else if (c === ',' && !inQ) {
      cols.push(cur); cur = '';
    } else {
      cur += c;
    }
  }
  cols.push(cur);
  return cols;
}

function mapHeader(raw) {
  const norm = raw.trim().toLowerCase();
  if (norm === 'date') return 'submissionDate';
  if (norm === 'full name') return 'name';
  if (norm === 'club') return 'club';
  if (norm === 'gender') return 'gender';
  if (norm === 'category') return 'category';
  if (norm === 'date of birth') return 'dob';
  if (norm === 'current weight (kg)') return 'weight';
  if (norm === 'bouts (the number only)') return 'bouts';
  if (norm === 'won (the number only)') return 'won';
  if (norm === 'lost (the number only)') return 'lost';
  if (norm.startsWith('additional information')) return 'comments';
  if (norm.startsWith('i understand')) return 'consent1';
  if (norm.startsWith('i accept')) return 'consent2';
  if (norm === 'email address') return 'email';
  if (norm === 'fit') return 'fit';
  if (norm === 'spars per day') return 'sparsPerDay';
  return norm;
}

function parseCSV(text) {
  const lines = text.replace(/\r/g, '').trim().split('\n');
  const rawHeaders = splitCSVLine(lines[0]);
  const headers = rawHeaders.map(mapHeader);
  return lines.slice(1).filter(l => l.trim()).map((line, idx) => {
    const cols = splitCSVLine(line);
    const o = {};
    headers.forEach((h, i) => { o[h] = (cols[i] || '').trim(); });
    o.weight = parseFloat(o.weight) || 0;
    o.bouts  = parseInt(o.bouts, 10)  || 0;
    o.won    = parseInt(o.won, 10)    || 0;
    o.lost   = parseInt(o.lost, 10)   || 0;
    o.sparsPerDay = parseInt(o.sparsPerDay, 10) || 1;
    const dobParts = (o.dob || '').split('/');
    o.yob = parseInt(dobParts[2]) || 0;
    o.experience = o.bouts;
    o.id = idx + 1;
    if (!o.fit) o.fit = 'yes';
    o.gender = o.gender ? o.gender.toLowerCase() : 'male';
    return o;
  });
}

function serializeCSV(data) {
  const headers = ['submissionDate','name','club','gender','category','dob','weight','bouts','won','lost','comments','consent1','consent2','email','fit','sparsPerDay'];
  const esc = v => {
    const s = String(v ?? '');
    return /[,"\n]/.test(s) ? `"${s.replace(/"/g, '""')}"` : s;
  };
  return [
    headers.join(','),
    ...data.map(b => headers.map(h => esc(b[h])).join(','))
  ].join('\n') + '\n';
}

// ── File I/O (File System Access API — Chrome/Edge) ───────────────────────────

async function openFile() {
  if (!window.showOpenFilePicker) {
    const input = document.createElement('input');
    input.type = 'file'; input.accept = '.csv';
    input.onchange = async () => {
      const text = await input.files[0].text();
      loadData(text, input.files[0].name);
      showToast('Read-only mode — Save will download a new file');
    };
    input.click();
    return;
  }
  try {
    [fileHandle] = await window.showOpenFilePicker({
      types: [{ description: 'CSV Files', accept: { 'text/csv': ['.csv'] } }],
      multiple: false
    });
    const file = await fileHandle.getFile();
    loadData(await file.text(), file.name);
  } catch (e) {
    if (e.name !== 'AbortError') showToast('Open failed: ' + e.message);
  }
}

async function saveFile() {
  if (!fileHandle) {
    const blob = new Blob([serializeCSV(boxers)], { type: 'text/csv' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'RegisteredBoxers2026.csv';
    a.click();
    showToast('Downloaded RegisteredBoxers2026.csv');
    return;
  }
  try {
    const writable = await fileHandle.createWritable();
    await writable.write(serializeCSV(boxers));
    await writable.close();
    showToast(`Saved ${boxers.length} boxers`);
  } catch (e) {
    showToast('Save failed: ' + e.message);
  }
}

function loadData(text, filename) {
  boxers = parseCSV(text);
  document.getElementById('addBtn').disabled = false;
  document.getElementById('saveBtn').disabled = false;
  document.getElementById('statsBar').style.display = 'flex';
  updateClubsList();
  updateCategoriesList();
  applySort();
  updateStats();
  showToast(`Loaded ${boxers.length} boxers from ${filename}`);
}

// ── Render ────────────────────────────────────────────────────────────────────

function renderTable() {
  const tbody = document.getElementById('tbody');
  const table = document.getElementById('boxerTable');
  const empty = document.getElementById('emptyState');

  if (!boxers.length) {
    table.style.display = 'none';
    empty.style.display = '';
    return;
  }
  table.style.display = '';
  empty.style.display = 'none';

  tbody.innerHTML = filtered.map(b => `
    <tr>
      <td>${b.id}</td>
      <td>${escHtml(b.name)}</td>
      <td>${escHtml(b.club)}</td>
      <td class="${b.gender === 'female' ? 'gender-female' : ''}">${b.gender}</td>
      <td>${b.yob || ''}</td>
      <td class="truncate">${escHtml(b.category || '')}</td>
      <td class="${b.fit === 'yes' ? 'fit-yes' : 'fit-no'}">${b.fit}</td>
      <td>${b.sparsPerDay ?? 1}</td>
      <td>${b.weight}</td>
      <td>${b.bouts}</td>
      <td>${b.won}</td>
      <td>${b.lost}</td>
      <td>${escHtml(b.dob || '')}</td>
      <td class="truncate">${escHtml(b.email || '')}</td>
      <td class="truncate">${escHtml(b.comments || '')}</td>
      <td class="truncate">${escHtml(b.submissionDate || '')}</td>
      <td class="actions">
        <button class="${b.fit === 'yes' ? 'btn-fit-yes' : 'btn-fit-no'}" onclick="toggleFit(${b.id})">${b.fit === 'yes' ? 'Fit ✓' : 'Unfit ✗'}</button>
        <button class="btn-edit"   onclick="openModal(${b.id})">Edit</button>
        <button class="btn-delete" onclick="deleteBoxer(${b.id})">Delete</button>
      </td>
    </tr>
  `).join('');

  document.querySelectorAll('thead th').forEach(th => th.classList.remove('sort-asc', 'sort-desc'));
  const cols = ['id','name','club','gender','yob','category','fit','sparsPerDay','weight','bouts','won','lost','dob','email','comments','submissionDate'];
  const idx  = cols.indexOf(sortCol);
  if (idx >= 0) document.querySelectorAll('thead th')[idx].classList.add(sortDir === 1 ? 'sort-asc' : 'sort-desc');

  const showing = document.getElementById('statShowing');
  showing.textContent = filtered.length < boxers.length
    ? `Showing ${filtered.length} of ${boxers.length}` : '';
}

function updateStats() {
  const males   = boxers.filter(b => b.gender === 'male').length;
  const females = boxers.filter(b => b.gender === 'female').length;
  const unfit   = boxers.filter(b => b.fit === 'no').length;
  document.getElementById('statTotal').textContent  = `Total: ${boxers.length}`;
  document.getElementById('statMale').textContent   = `Male: ${males}`;
  document.getElementById('statFemale').textContent = `Female: ${females}`;
  document.getElementById('statUnfit').textContent  = `Not fit: ${unfit}`;
}

function updateClubsList() {
  const clubs = [...new Set(boxers.map(b => b.club))].sort();
  document.getElementById('clubsList').innerHTML = clubs.map(c => `<option value="${escHtml(c)}">`).join('');
}

function updateCategoriesList() {
  const cats = [...new Set(boxers.map(b => b.category).filter(Boolean))].sort();
  document.getElementById('categoriesList').innerHTML = cats.map(c => `<option value="${escHtml(c)}">`).join('');
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Sort & filter ─────────────────────────────────────────────────────────────

function sortBy(col) {
  sortDir = (sortCol === col) ? sortDir * -1 : 1;
  sortCol = col;
  applySort();
  renderTable();
}

function applySort() {
  const dir = sortDir;
  boxers.sort((a, b) => {
    const av = a[sortCol], bv = b[sortCol];
    if (typeof av === 'number') return (av - bv) * dir;
    return String(av).localeCompare(String(bv)) * dir;
  });
  filterTable();
}

function filterTable() {
  const q = document.getElementById('searchInput').value.toLowerCase().trim();
  filtered = q
    ? boxers.filter(b =>
        (b.name     || '').toLowerCase().includes(q) ||
        (b.club     || '').toLowerCase().includes(q) ||
        (b.category || '').toLowerCase().includes(q) ||
        (b.email    || '').toLowerCase().includes(q) ||
        (b.comments || '').toLowerCase().includes(q))
    : [...boxers];
  renderTable();
}

// ── CRUD ──────────────────────────────────────────────────────────────────────

function openModal(id) {
  editingId = id;
  document.getElementById('modalTitle').textContent = id === null ? 'Add Boxer' : 'Edit Boxer';

  if (id === null) {
    document.getElementById('f_name').value            = '';
    document.getElementById('f_club').value            = '';
    document.getElementById('f_gender').value          = 'male';
    document.getElementById('f_category').value        = '';
    document.getElementById('f_dob').value             = '';
    document.getElementById('f_weight').value          = '';
    document.getElementById('f_bouts').value           = '0';
    document.getElementById('f_won').value             = '0';
    document.getElementById('f_lost').value            = '0';
    document.getElementById('f_fit').value             = 'yes';
    document.getElementById('f_spars_per_day').value   = '1';
    document.getElementById('f_email').value           = '';
    document.getElementById('f_comments').value        = '';
    const _t = new Date(); document.getElementById('f_submission_date').value = `${String(_t.getDate()).padStart(2,'0')}/${String(_t.getMonth()+1).padStart(2,'0')}/${_t.getFullYear()}`;
    document.getElementById('f_consent1').value        = '';
    document.getElementById('f_consent2').value        = '';
  } else {
    const b = boxers.find(x => x.id === id);
    document.getElementById('f_name').value            = b.name || '';
    document.getElementById('f_club').value            = b.club || '';
    document.getElementById('f_gender').value          = b.gender || 'male';
    document.getElementById('f_category').value        = b.category || '';
    document.getElementById('f_dob').value             = b.dob || '';
    document.getElementById('f_weight').value          = b.weight || '';
    document.getElementById('f_bouts').value           = b.bouts ?? 0;
    document.getElementById('f_won').value             = b.won   ?? 0;
    document.getElementById('f_lost').value            = b.lost  ?? 0;
    document.getElementById('f_fit').value             = b.fit || 'yes';
    document.getElementById('f_spars_per_day').value   = b.sparsPerDay ?? 1;
    document.getElementById('f_email').value           = b.email || '';
    document.getElementById('f_comments').value        = b.comments || '';
    document.getElementById('f_submission_date').value = b.submissionDate || '';
    document.getElementById('f_consent1').value        = b.consent1 || '';
    document.getElementById('f_consent2').value        = b.consent2 || '';
  }

  document.getElementById('modalOverlay').classList.add('open');
  document.getElementById('f_name').focus();
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  editingId = null;
}

function saveRow() {
  const name     = document.getElementById('f_name').value.trim();
  const club     = document.getElementById('f_club').value.trim();
  const gender   = document.getElementById('f_gender').value;
  const category = document.getElementById('f_category').value.trim();
  const dob      = document.getElementById('f_dob').value.trim();
  const weight   = parseFloat(document.getElementById('f_weight').value);
  const bouts    = parseInt(document.getElementById('f_bouts').value, 10)  || 0;
  const won      = parseInt(document.getElementById('f_won').value, 10)    || 0;
  const lost     = parseInt(document.getElementById('f_lost').value, 10)   || 0;
  const fit      = document.getElementById('f_fit').value;
  const sparsPerDay = parseInt(document.getElementById('f_spars_per_day').value, 10) || 1;
  const email    = document.getElementById('f_email').value.trim();
  const comments = document.getElementById('f_comments').value.trim();
  const submissionDate = document.getElementById('f_submission_date').value;
  const consent1 = document.getElementById('f_consent1').value;
  const consent2 = document.getElementById('f_consent2').value;

  if (!name)                        return flash('f_name');
  if (!club)                        return flash('f_club');
  if (!dob)                         return flash('f_dob');
  if (isNaN(weight) || weight < 20) return flash('f_weight');

  const dobParts = dob.split('/');
  const yob = parseInt(dobParts[2]) || 0;
  const experience = bouts;

  if (editingId === null) {
    const newId = boxers.length ? Math.max(...boxers.map(b => b.id)) + 1 : 1;
    boxers.push({ id: newId, name, club, gender, category, dob, yob, weight, bouts, won, lost, fit, sparsPerDay, email, comments, submissionDate, consent1, consent2, experience });
    showToast(`Added ${name} (ID ${newId})`);
  } else {
    const idx = boxers.findIndex(b => b.id === editingId);
    boxers[idx] = { ...boxers[idx], name, club, gender, category, dob, yob, weight, bouts, won, lost, fit, sparsPerDay, email, comments, experience };
    showToast(`Updated ${name}`);
  }

  closeModal();
  updateClubsList();
  updateCategoriesList();
  applySort();
  updateStats();
  saveToServer();
}

function toggleFit(id) {
  const b = boxers.find(x => x.id === id);
  b.fit = b.fit === 'yes' ? 'no' : 'yes';
  filterTable();
  updateStats();
  showToast(`${b.name} marked as ${b.fit === 'yes' ? 'fit' : 'unfit'}`);
  saveToServer();
}

function deleteBoxer(id) {
  const b = boxers.find(x => x.id === id);
  if (!b || !confirm(`Delete ${b.name}?`)) return;
  boxers = boxers.filter(x => x.id !== id);
  filterTable();
  updateStats();
  showToast(`Deleted ${b.name}`);
}

function flash(fieldId) {
  const el = document.getElementById(fieldId);
  el.classList.add('error');
  el.focus();
  setTimeout(() => el.classList.remove('error'), 1500);
}

// ── Toast ─────────────────────────────────────────────────────────────────────

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

// ── Server I/O ────────────────────────────────────────────────────────────────

const SERVER = window.location.origin;

async function loadFromServer() {
  try {
    boxers = await DataClient.get('boxers');
    boxers.forEach(b => {
      b.fit = (b.fit === true || b.fit === 'yes') ? 'yes' : 'no';
      b.sparsPerDay = parseInt(b.sparsPerDay, 10) || 1;
    });
    document.getElementById('addBtn').disabled = false;
    document.getElementById('saveBtn').disabled = false;
    document.getElementById('statsBar').style.display = 'flex';
    updateClubsList();
    updateCategoriesList();
    applySort();
    updateStats();
    showToast(`Loaded ${boxers.length} boxers from server`);
  } catch (e) {
    document.getElementById('emptyState').innerHTML =
      `Could not load from server: ${e.message}<br><small>Use <strong>Open CSV</strong> as fallback, or start Server.js.</small>`;
  }
}

async function saveToServer() {
  try {
    await DataClient.save('boxers', boxers);
    showToast(`Saved ${boxers.length} boxers to server`);
  } catch (e) {
    showToast('Server save failed — downloading CSV instead');
    const blob = new Blob([serializeCSV(boxers)], { type: 'text/csv' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob); a.download = 'RegisteredBoxers2026.csv'; a.click();
  }
}

// ── Keyboard shortcuts ────────────────────────────────────────────────────────

document.addEventListener('keydown', e => {
  const modalOpen = document.getElementById('modalOverlay').classList.contains('open');
  if (e.key === 'Escape' && modalOpen) closeModal();
  if (e.key === 'Enter'  && modalOpen) saveRow();
  if ((e.ctrlKey || e.metaKey) && e.key === 's') { e.preventDefault(); saveToServer(); }
});

// ── DOB → Category auto-fill ──────────────────────────────────────────────────

function deriveCategory(yob) {
  if (!yob) return '';
  const age = new Date().getFullYear() - yob;
  if (age >= 12 && age <= 14) return 'Schools';
  if (age >= 15 && age <= 16) return 'Junior';
  if (age >= 17 && age <= 18) return 'Youth';
  if (age >= 19) return 'Senior';
  return '';
}

document.getElementById('f_dob').addEventListener('change', () => {
  const parts = document.getElementById('f_dob').value.split('/');
  const yob = parseInt(parts[2]);
  const cat = deriveCategory(yob);
  if (cat) document.getElementById('f_category').value = cat;
});

// ── Auto-load ─────────────────────────────────────────────────────────────────
loadFromServer();
</script>
<script src="theme.js"></script>
</body>
</html>
