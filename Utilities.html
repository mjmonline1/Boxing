<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Utilities — Boxing Tournament Manager</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #22272e;
    --surface: #2d333b;
    --surface2: #373e47;
    --border: #444c56;
    --blue: #58a6ff;
    --blue-dim: rgba(88,166,255,0.16);
    --green: #3fb950;
    --green-dim: rgba(63,185,80,0.16);
    --red: #f85149;
    --red-dim: rgba(248,81,73,0.16);
    --text: #cdd9e5;
    --muted: #768390;
    --faint: #4a5568;
    --nav-btn-border: #444c56;
    --nav-btn-color: #768390;
    --nav-btn-hover-border: #768390;
    --nav-btn-hover-color: #cdd9e5;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    min-height: 100vh;
    padding: 0;
  }

  #toolbar {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
  }

  #toolbar h1 {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text);
    flex: 1;
  }

  #toolbar a.nav-btn {
    padding: 6px 14px;
    border: 1px solid var(--nav-btn-border);
    border-radius: 6px;
    color: var(--nav-btn-color);
    text-decoration: none;
    font-size: 13px;
    font-weight: bold;
    white-space: nowrap;
    transition: border-color 0.15s, color 0.15s;
  }
  #toolbar a.nav-btn:hover { border-color: var(--nav-btn-hover-border); color: var(--nav-btn-hover-color); }

  .content {
    max-width: 720px;
    margin: 3rem auto;
    padding: 0 1.5rem;
  }

  .util-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1.5rem;
    margin-bottom: 1.25rem;
  }

  .util-card h2 {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text);
    margin-bottom: 0.4rem;
  }

  .util-card p {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 1.1rem;
    line-height: 1.5;
  }

  .btn-row {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }

  .btn {
    padding: 8px 18px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    font-weight: bold;
    font-family: 'Barlow', sans-serif;
    transition: opacity 0.15s;
  }
  .btn:disabled { opacity: 0.4; cursor: default; }
  .btn-blue  { background: #2196f3; color: white; }
  .btn-green { background: #4caf50; color: white; }

  .btn-file-label {
    padding: 8px 18px;
    border: 1px solid var(--nav-btn-border);
    border-radius: 6px;
    color: var(--nav-btn-color);
    font-size: 13px;
    font-weight: bold;
    cursor: pointer;
    white-space: nowrap;
    transition: border-color 0.15s, color 0.15s;
  }
  .btn-file-label:hover { border-color: var(--nav-btn-hover-border); color: var(--nav-btn-hover-color); }

  #statusBox {
    display: none;
    margin-top: 1rem;
    padding: 10px 14px;
    border-radius: 6px;
    font-size: 13px;
    line-height: 1.5;
  }
  #statusBox.info    { background: var(--blue-dim);  color: var(--blue);  border: 1px solid rgba(88,166,255,0.3); }
  #statusBox.success { background: var(--green-dim); color: var(--green); border: 1px solid rgba(63,185,80,0.3); }
  #statusBox.error   { background: var(--red-dim);   color: var(--red);   border: 1px solid rgba(248,81,73,0.3); }

  #fileNameLabel {
    font-size: 12px;
    color: var(--muted);
    font-style: italic;
  }

  #rptStatusBox {
    display: none;
    margin-top: 1rem;
    padding: 10px 14px;
    border-radius: 6px;
    font-size: 13px;
    line-height: 1.5;
  }
  #rptStatusBox.info    { background: var(--blue-dim);  color: var(--blue);  border: 1px solid rgba(88,166,255,0.3); }
  #rptStatusBox.success { background: var(--green-dim); color: var(--green); border: 1px solid rgba(63,185,80,0.3); }
  #rptStatusBox.error   { background: var(--red-dim);   color: var(--red);   border: 1px solid rgba(248,81,73,0.3); }
</style>
<link rel="stylesheet" href="theme.css">
</head>
<body>

<div id="toolbar">
  <a class="nav-btn" href="index.html">&#8592; Home</a>
  <h1>Utilities</h1>
  <button class="theme-btn"></button>
</div>

<div class="content">

  <div class="util-card">
    <h2>&#128196; Import Spreadsheet</h2>
    <p>Load a CSV registration spreadsheet and import all boxers into the database. Replaces the existing boxer list.</p>
    <div class="btn-row">
      <label class="btn-file-label">
        Choose CSV
        <input type="file" accept=".csv" id="csvInput" style="display:none">
      </label>
      <span id="fileNameLabel">No file chosen</span>
      <button class="btn btn-blue" id="importBtn" disabled>&#8679; Import to Database</button>
    </div>
    <div id="statusBox"></div>
  </div>

  <div class="util-card">
    <h2>&#128196; Reports</h2>
    <p>Generate a PDF report for each dataset. Data is loaded live from the database.</p>
    <div class="btn-row">
      <button class="btn btn-blue" id="rptFighters">Fighters</button>
      <button class="btn btn-blue" id="rptBuckets">Buckets</button>
      <button class="btn btn-blue" id="rptSpars">Spars</button>
      <button class="btn btn-blue" id="rptRings">Rings</button>
    </div>
    <div id="rptStatusBox"></div>
  </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<script src="data-client.js"></script>
<script>
  function splitCSVRecords(text) {
    const records = [];
    let current = '', inQuotes = false;
    for (const c of text) {
      if (c === '"') { inQuotes = !inQuotes; current += c; }
      else if (c === '\n' && !inQuotes) {
        const rec = current.replace(/\r$/, '').trim();
        if (rec) records.push(rec);
        current = '';
      } else { current += c; }
    }
    const rec = current.trim();
    if (rec) records.push(rec);
    return records;
  }

  function splitCSV(line) {
    const result = [];
    let cur = '', inQ = false;
    for (let i = 0; i < line.length; i++) {
      const ch = line[i];
      if (ch === '"') { if (inQ && line[i+1] === '"') { cur += '"'; i++; } else inQ = !inQ; }
      else if (ch === ',' && !inQ) { result.push(cur); cur = ''; }
      else cur += ch;
    }
    result.push(cur);
    return result;
  }

  function mapHeader(raw) {
    const norm = raw.trim().toLowerCase();
    if (norm === 'date') return 'submissionDate';
    if (norm === 'full name') return 'name';
    if (norm === 'club') return 'club';
    if (norm === 'gender') return 'gender';
    if (norm === 'category') return 'category';
    if (norm === 'date of birth') return 'dob';
    if (norm === 'current weight (kg)') return 'weight';
    if (norm === 'bouts (the number only)') return 'bouts';
    if (norm === 'won (the number only)') return 'won';
    if (norm === 'lost (the number only)') return 'lost';
    if (norm.startsWith('additional information')) return 'comments';
    if (norm.startsWith('i understand')) return 'consent1';
    if (norm.startsWith('i accept')) return 'consent2';
    if (norm === 'email address') return 'email';
    if (norm === 'fit') return 'fit';
    return norm;
  }

  function parseBoxers(text) {
    const lines = splitCSVRecords(text);
    const headers = splitCSV(lines[0]).map(mapHeader);
    return lines.slice(1).filter(l => l.trim()).map((line, idx) => {
      const vals = splitCSV(line);
      const obj = {};
      headers.forEach((h, i) => {
        const v = (vals[i] || '').trim();
        if (h === 'weight') obj[h] = parseFloat(v) || 0;
        else if (['bouts', 'won', 'lost'].includes(h)) obj[h] = parseInt(v) || 0;
        else obj[h] = v;
      });
      obj.gender = obj.gender ? obj.gender.toLowerCase() : 'male';
      const dobParts = (obj.dob || '').split('/');
      obj.yob = parseInt(dobParts[2]) || 0;
      obj.experience = obj.bouts || 0;
      obj.id = idx + 1;
      if (!obj.fit) obj.fit = 'yes';
      return obj;
    });
  }

  function setStatus(type, msg) {
    const el = document.getElementById('statusBox');
    el.className = type;
    el.textContent = msg;
    el.style.display = 'block';
  }

  let parsedBoxers = null;

  document.getElementById('csvInput').addEventListener('change', function () {
    const file = this.files[0];
    if (!file) return;
    document.getElementById('fileNameLabel').textContent = file.name;
    const reader = new FileReader();
    reader.onload = e => {
      try {
        parsedBoxers = parseBoxers(e.target.result);
        document.getElementById('importBtn').disabled = false;
        setStatus('info', `Ready to import ${parsedBoxers.length} boxers from "${file.name}"`);
      } catch (err) {
        parsedBoxers = null;
        document.getElementById('importBtn').disabled = true;
        setStatus('error', `Could not parse CSV: ${err.message}`);
      }
    };
    reader.readAsText(file);
    this.value = '';
  });

  document.getElementById('importBtn').addEventListener('click', async () => {
    if (!parsedBoxers) return;
    const btn = document.getElementById('importBtn');
    btn.disabled = true;
    setStatus('info', `Importing ${parsedBoxers.length} boxers…`);
    try {
      await DataClient.save('boxers', parsedBoxers);
      // Clear derived data so stale buckets/spars/schedule don't persist
      await Promise.all(['buckets', 'spars', 'schedule'].map(k => DataClient.save(k, null).catch(() => {})));
      setStatus('success', `✓ Imported ${parsedBoxers.length} boxers. Buckets, spars and schedule have been reset.`);
    } catch (e) {
      setStatus('error', `Import failed: ${e.message}`);
      btn.disabled = false;
    }
  });
</script>
<script>
// ── Reports ──────────────────────────────────────────────────────────────────

function setRptStatus(type, msg) {
  const el = document.getElementById('rptStatusBox');
  el.className = type;
  el.textContent = msg;
  el.style.display = 'block';
}

function makePdf(title) {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ orientation: 'landscape', unit: 'mm', format: 'a4' });
  doc.setFont('helvetica', 'bold');
  doc.setFontSize(16);
  doc.text(title, 14, 16);
  doc.setFont('helvetica', 'normal');
  doc.setFontSize(9);
  doc.setTextColor(120);
  doc.text(`Generated: ${new Date().toLocaleString()}`, 14, 23);
  doc.setTextColor(0);
  return doc;
}

document.getElementById('rptFighters').addEventListener('click', async () => {
  try {
    setRptStatus('info', 'Loading fighters…');
    const boxers = await DataClient.get('boxers');
    if (!boxers || !boxers.length) { setRptStatus('error', 'No fighters in database.'); return; }
    const doc = makePdf('Fighters Report');
    doc.autoTable({
      startY: 28,
      head: [['#', 'Name', 'Club', 'Gender', 'Category', 'DOB', 'Weight (kg)', 'Bouts', 'Won', 'Lost', 'Fit']],
      body: boxers.map((b, i) => [
        i + 1, b.name || '', b.club || '', b.gender || '', b.category || '',
        b.dob || '', b.weight || '', b.bouts || 0, b.won || 0, b.lost || 0, b.fit || ''
      ]),
      styles: { fontSize: 7.5, cellPadding: 1.8 },
      headStyles: { fillColor: [33, 150, 243] },
      alternateRowStyles: { fillColor: [245, 245, 245] },
      columnStyles: { 0: { cellWidth: 8 }, 6: { cellWidth: 18 }, 7: { cellWidth: 12 }, 8: { cellWidth: 10 }, 9: { cellWidth: 10 }, 10: { cellWidth: 10 } }
    });
    doc.save('fighters.pdf');
    setRptStatus('success', `✓ fighters.pdf — ${boxers.length} fighters`);
  } catch (e) { setRptStatus('error', `Error: ${e.message}`); }
});

document.getElementById('rptBuckets').addEventListener('click', async () => {
  try {
    setRptStatus('info', 'Loading buckets…');
    const data = await DataClient.get('buckets');
    const fb = data && (data.finalBuckets || data);
    if (!fb || typeof fb !== 'object') { setRptStatus('error', 'No bucket data.'); return; }
    const doc = makePdf('Buckets Report');
    let y = 28;
    let totalFighters = 0;
    for (const [bucketName, fighters] of Object.entries(fb)) {
      if (!Array.isArray(fighters) || !fighters.length) continue;
      totalFighters += fighters.length;
      doc.autoTable({
        startY: y,
        head: [
          [{ content: `${bucketName}  (${fighters.length} fighters)`, colSpan: 5, styles: { fillColor: [45, 51, 59], textColor: [205, 217, 229], fontStyle: 'bold', fontSize: 8 } }],
          ['#', 'Name', 'Club', 'Weight (kg)', 'Bouts']
        ],
        body: fighters.map((b, i) => [i + 1, b.name || '', b.club || '', b.weight || '', b.bouts || 0]),
        styles: { fontSize: 7.5, cellPadding: 1.8 },
        headStyles: { fillColor: [33, 150, 243] },
        alternateRowStyles: { fillColor: [245, 245, 245] },
        columnStyles: { 0: { cellWidth: 8 }, 3: { cellWidth: 20 }, 4: { cellWidth: 14 } }
      });
      y = doc.lastAutoTable.finalY + 6;
      if (y > 175) { doc.addPage(); y = 20; }
    }
    doc.save('buckets.pdf');
    setRptStatus('success', `✓ buckets.pdf — ${totalFighters} fighters across ${Object.keys(fb).length} buckets`);
  } catch (e) { setRptStatus('error', `Error: ${e.message}`); }
});

document.getElementById('rptSpars').addEventListener('click', async () => {
  try {
    setRptStatus('info', 'Loading spars…');
    const data = await DataClient.get('spars');
    const matches = data && (data.matches || (Array.isArray(data) ? data : null));
    if (!matches || !matches.length) { setRptStatus('error', 'No spar data.'); return; }
    const doc = makePdf('Sparring Pairs Report');
    doc.autoTable({
      startY: 28,
      head: [['#', 'Red Corner', 'Red Club', 'Blue Corner', 'Blue Club', 'Category', 'Weight Diff']],
      body: matches.map((m, i) => {
        const diff = (m.red && m.blue) ? Math.abs((m.red.weight || 0) - (m.blue.weight || 0)).toFixed(1) + ' kg' : '';
        return [i + 1, m.red?.name || '', m.red?.club || '', m.blue?.name || '', m.blue?.club || '', m.category || '', diff];
      }),
      styles: { fontSize: 7.5, cellPadding: 1.8 },
      headStyles: { fillColor: [33, 150, 243] },
      alternateRowStyles: { fillColor: [245, 245, 245] },
      columnStyles: { 0: { cellWidth: 8 }, 6: { cellWidth: 18 } }
    });
    const unmatched = data.unmatched;
    if (Array.isArray(unmatched) && unmatched.length) {
      let y = doc.lastAutoTable.finalY + 8;
      if (y > 175) { doc.addPage(); y = 20; }
      doc.autoTable({
        startY: y,
        head: [
          [{ content: `Unmatched Fighters (${unmatched.length})`, colSpan: 4, styles: { fillColor: [180, 50, 40], textColor: [255, 255, 255], fontStyle: 'bold', fontSize: 8 } }],
          ['Name', 'Club', 'Category', 'Weight (kg)']
        ],
        body: unmatched.map(b => [b.name || '', b.club || '', b.category || '', b.weight || '']),
        styles: { fontSize: 7.5, cellPadding: 1.8 },
        headStyles: { fillColor: [200, 80, 70] },
        alternateRowStyles: { fillColor: [245, 245, 245] }
      });
    }
    doc.save('spars.pdf');
    setRptStatus('success', `✓ spars.pdf — ${matches.length} pairs${unmatched?.length ? `, ${unmatched.length} unmatched` : ''}`);
  } catch (e) { setRptStatus('error', `Error: ${e.message}`); }
});

document.getElementById('rptRings').addEventListener('click', async () => {
  try {
    setRptStatus('info', 'Loading schedule…');
    const data = await DataClient.get('schedule');
    const slots = data && (data.slots || (Array.isArray(data) ? data : null));
    if (!slots || !slots.length) { setRptStatus('error', 'No schedule data.'); return; }
    const doc = makePdf('Ring Schedule Report');
    const rows = [];
    for (const slot of slots) {
      for (const bout of (slot.bouts || [])) {
        rows.push([
          slot.slot, bout.ring || '', bout.sparId || '',
          bout.red?.name || '', bout.red?.club || '',
          bout.blue?.name || '', bout.blue?.club || '',
          bout.category || '', bout.weightDiff ? bout.weightDiff + ' kg' : ''
        ]);
      }
    }
    doc.autoTable({
      startY: 28,
      head: [['Slot', 'Ring', 'Spar', 'Red Corner', 'Red Club', 'Blue Corner', 'Blue Club', 'Category', 'Wt Diff']],
      body: rows,
      styles: { fontSize: 7.5, cellPadding: 1.8 },
      headStyles: { fillColor: [33, 150, 243] },
      alternateRowStyles: { fillColor: [245, 245, 245] },
      columnStyles: { 0: { cellWidth: 10 }, 1: { cellWidth: 10 }, 2: { cellWidth: 12 }, 8: { cellWidth: 14 } }
    });
    doc.save('rings.pdf');
    setRptStatus('success', `✓ rings.pdf — ${rows.length} bouts across ${slots.length} slots`);
  } catch (e) { setRptStatus('error', `Error: ${e.message}`); }
});
</script>
<script src="theme.js"></script>
</body>
</html>
