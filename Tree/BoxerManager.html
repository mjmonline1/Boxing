<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Boxer Manager 2025</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body { font-family: Arial, sans-serif; margin: 0; background: #f0f2f5; }

    /* ── Toolbar ── */
    #toolbar {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 16px; background: #1a1a2e; color: white;
      position: sticky; top: 0; z-index: 10;
    }
    #toolbar h1 { margin: 0; font-size: 18px; flex: 1; }
    #toolbar button {
      padding: 7px 14px; border: none; border-radius: 6px;
      cursor: pointer; font-size: 13px; font-weight: bold;
    }
    #toolbar button:disabled { opacity: .45; cursor: default; }
    #openBtn  { background: #4a90d9; color: white; }
    #saveBtn  { background: #4caf50; color: white; }
    #addBtn   { background: #ff9800; color: white; }
    #searchInput {
      padding: 6px 10px; border: none; border-radius: 6px;
      font-size: 13px; width: 200px;
    }

    /* ── Stats bar ── */
    #statsBar {
      display: none; gap: 20px;
      padding: 6px 16px; background: white;
      border-bottom: 1px solid #ddd; font-size: 12px; color: #555;
    }

    /* ── Table ── */
    #tableWrap { padding: 12px; overflow-x: auto; }

    #emptyState {
      text-align: center; padding: 60px 20px;
      color: #999; font-size: 15px;
    }

    table {
      width: 100%; border-collapse: collapse; background: white;
      border-radius: 8px; overflow: hidden;
      box-shadow: 0 1px 4px rgba(0,0,0,.1); font-size: 13px;
    }
    thead th {
      background: #1a1a2e; color: white;
      padding: 10px 12px; text-align: left;
      cursor: pointer; white-space: nowrap; user-select: none;
    }
    thead th:last-child { cursor: default; }
    thead th:hover:not(:last-child) { background: #2a2a4e; }
    thead th.sort-asc::after  { content: ' ↑'; }
    thead th.sort-desc::after { content: ' ↓'; }

    tbody tr:nth-child(even) { background: #f9f9f9; }
    tbody tr:hover           { background: #e8f4ff; }
    td { padding: 8px 12px; border-bottom: 1px solid #eee; }
    td.actions { white-space: nowrap; }

    .btn-edit      { padding: 4px 10px; border: none; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: bold; background: #4a90d9; color: white; margin-right: 4px; }
    .btn-delete    { padding: 4px 10px; border: none; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: bold; background: #e53935; color: white; }
    .btn-fit-yes   { padding: 4px 10px; border: none; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: bold; background: #4caf50; color: white; margin-right: 4px; }
    .btn-fit-no    { padding: 4px 10px; border: none; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: bold; background: #ff9800; color: white; margin-right: 4px; }

    .fit-yes { color: #4caf50; font-weight: bold; }
    .fit-no  { color: #e53935; font-weight: bold; }
    .gender-female { color: #e91e8c; }

    /* ── Modal ── */
    #modalOverlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.5); z-index: 100;
      align-items: center; justify-content: center;
    }
    #modalOverlay.open { display: flex; }

    #modal {
      background: white; border-radius: 10px;
      width: 460px; max-width: 95vw;
      padding: 24px; box-shadow: 0 8px 32px rgba(0,0,0,.3);
    }
    #modal h2 { margin: 0 0 20px; font-size: 17px; color: #1a1a2e; }

    .form-row      { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
    .form-row.full { grid-template-columns: 1fr; }
    .form-group    { display: flex; flex-direction: column; gap: 4px; }
    .form-group label { font-size: 12px; font-weight: bold; color: #555; text-transform: uppercase; letter-spacing: .4px; }
    .form-group input, .form-group select {
      padding: 7px 10px; border: 1px solid #ccc;
      border-radius: 6px; font-size: 13px;
    }
    .form-group input:focus, .form-group select:focus {
      outline: none; border-color: #4a90d9;
      box-shadow: 0 0 0 2px rgba(74,144,217,.2);
    }
    .form-group input.error { border-color: #e53935; }

    .modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 20px; }
    .modal-actions button {
      padding: 8px 22px; border: none; border-radius: 6px;
      cursor: pointer; font-size: 13px; font-weight: bold;
    }
    #cancelBtn  { background: #eee; color: #333; }
    #saveRowBtn { background: #4caf50; color: white; }

    /* ── Toast ── */
    #toast {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      background: #333; color: white; padding: 10px 20px; border-radius: 6px;
      font-size: 13px; opacity: 0; transition: opacity .3s; pointer-events: none; z-index: 200;
    }
    #toast.show { opacity: 1; }
  </style>
</head>
<body>

<div id="toolbar">
  <h1>Boxer Manager 2025</h1>
  <input type="text" id="searchInput" placeholder="Search name / club…" oninput="filterTable()">
  <button id="addBtn"  onclick="openModal(null)" disabled>+ Add Boxer</button>
  <button id="openBtn" onclick="openFile()">Open CSV</button>
  <button id="saveBtn" onclick="saveFile()"  disabled>Save CSV</button>
</div>

<div id="statsBar">
  <span id="statTotal"></span>
  <span id="statMale"></span>
  <span id="statFemale"></span>
  <span id="statUnfit"></span>
  <span id="statShowing" style="margin-left:auto;color:#999"></span>
</div>

<div id="tableWrap">
  <div id="emptyState">
    Click <strong>Open CSV</strong> to load RegisteredBoxers2025.csv.<br>
    <small style="color:#bbb">Requires Chrome or Edge for direct file saving.</small>
  </div>
  <table id="boxerTable" style="display:none">
    <thead>
      <tr>
        <th onclick="sortBy('id')">ID</th>
        <th onclick="sortBy('name')">Name</th>
        <th onclick="sortBy('club')">Club</th>
        <th onclick="sortBy('gender')">Gender</th>
        <th onclick="sortBy('yob')">YOB</th>
        <th onclick="sortBy('fit')">Fit</th>
        <th onclick="sortBy('weight')">Weight (kg)</th>
        <th onclick="sortBy('experience')">Exp</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

<!-- Add / Edit Modal -->
<div id="modalOverlay">
  <div id="modal">
    <h2 id="modalTitle">Add Boxer</h2>

    <div class="form-row full">
      <div class="form-group">
        <label>Name</label>
        <input id="f_name" type="text" placeholder="Full name">
      </div>
    </div>

    <div class="form-row full">
      <div class="form-group">
        <label>Club</label>
        <input id="f_club" type="text" placeholder="Club name" list="clubsList">
        <datalist id="clubsList"></datalist>
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>Gender</label>
        <select id="f_gender">
          <option value="male">Male</option>
          <option value="female">Female</option>
        </select>
      </div>
      <div class="form-group">
        <label>Year of Birth</label>
        <input id="f_yob" type="number" min="1950" max="2020" placeholder="e.g. 2009">
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>Weight (kg)</label>
        <input id="f_weight" type="number" min="20" max="250" step="0.1" placeholder="e.g. 65.5">
      </div>
      <div class="form-group">
        <label>Experience (bouts)</label>
        <input id="f_experience" type="number" min="0" step="1" placeholder="e.g. 12">
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>Fit to compete?</label>
        <select id="f_fit">
          <option value="yes">Yes</option>
          <option value="no">No</option>
        </select>
      </div>
    </div>

    <div class="modal-actions">
      <button id="cancelBtn"  onclick="closeModal()">Cancel</button>
      <button id="saveRowBtn" onclick="saveRow()">Save</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ── State ─────────────────────────────────────────────────────────────────────

let boxers     = [];
let filtered   = [];
let fileHandle = null;
let editingId  = null;
let sortCol    = 'id';
let sortDir    = 1;      // 1 = asc, -1 = desc

// ── CSV helpers ───────────────────────────────────────────────────────────────

function splitCSVLine(line) {
  const cols = [];
  let cur = '', inQ = false;
  for (let i = 0; i < line.length; i++) {
    const c = line[i];
    if (c === '"') {
      if (inQ && line[i + 1] === '"') { cur += '"'; i++; }
      else inQ = !inQ;
    } else if (c === ',' && !inQ) {
      cols.push(cur); cur = '';
    } else {
      cur += c;
    }
  }
  cols.push(cur);
  return cols;
}

function parseCSV(text) {
  const lines = text.replace(/\r/g, '').trim().split('\n');
  const headers = splitCSVLine(lines[0]);
  return lines.slice(1).filter(l => l.trim()).map(line => {
    const cols = splitCSVLine(line);
    const o = {};
    headers.forEach((h, i) => o[h.trim()] = (cols[i] || '').trim());
    o.id         = parseInt(o.id, 10);
    o.yob        = parseInt(o.yob, 10);
    o.weight     = parseFloat(o.weight);
    o.experience = parseInt(o.experience, 10);
    return o;
  });
}

function serializeCSV(data) {
  const headers = ['id', 'name', 'club', 'gender', 'yob', 'fit', 'weight', 'experience'];
  const esc = v => {
    const s = String(v);
    return /[,"\n]/.test(s) ? `"${s.replace(/"/g, '""')}"` : s;
  };
  return [
    headers.join(','),
    ...data.map(b => headers.map(h => esc(b[h])).join(','))
  ].join('\n') + '\n';
}

// ── File I/O (File System Access API — Chrome/Edge) ───────────────────────────

async function openFile() {
  if (!window.showOpenFilePicker) {
    // Fallback: use hidden file input for read-only load
    const input = document.createElement('input');
    input.type = 'file'; input.accept = '.csv';
    input.onchange = async () => {
      const text = await input.files[0].text();
      loadData(text, input.files[0].name);
      showToast('Read-only mode — Save will download a new file');
    };
    input.click();
    return;
  }
  try {
    [fileHandle] = await window.showOpenFilePicker({
      types: [{ description: 'CSV Files', accept: { 'text/csv': ['.csv'] } }],
      multiple: false
    });
    const file = await fileHandle.getFile();
    loadData(await file.text(), file.name);
  } catch (e) {
    if (e.name !== 'AbortError') showToast('Open failed: ' + e.message);
  }
}

async function saveFile() {
  if (!fileHandle) {
    // Fallback download
    const blob = new Blob([serializeCSV(boxers)], { type: 'text/csv' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'RegisteredBoxers2025.csv';
    a.click();
    showToast('Downloaded RegisteredBoxers2025.csv');
    return;
  }
  try {
    const writable = await fileHandle.createWritable();
    await writable.write(serializeCSV(boxers));
    await writable.close();
    showToast(`Saved ${boxers.length} boxers`);
  } catch (e) {
    showToast('Save failed: ' + e.message);
  }
}

function loadData(text, filename) {
  boxers = parseCSV(text);
  document.getElementById('addBtn').disabled = false;
  document.getElementById('saveBtn').disabled = false;
  document.getElementById('statsBar').style.display = 'flex';
  updateClubsList();
  applySort();
  updateStats();
  showToast(`Loaded ${boxers.length} boxers from ${filename}`);
}

// ── Render ────────────────────────────────────────────────────────────────────

function renderTable() {
  const tbody = document.getElementById('tbody');
  const table = document.getElementById('boxerTable');
  const empty = document.getElementById('emptyState');

  if (!boxers.length) {
    table.style.display = 'none';
    empty.style.display = '';
    return;
  }
  table.style.display = '';
  empty.style.display = 'none';

  tbody.innerHTML = filtered.map(b => `
    <tr>
      <td>${b.id}</td>
      <td>${escHtml(b.name)}</td>
      <td>${escHtml(b.club)}</td>
      <td class="${b.gender === 'female' ? 'gender-female' : ''}">${b.gender}</td>
      <td>${b.yob}</td>
      <td class="${b.fit === 'yes' ? 'fit-yes' : 'fit-no'}">${b.fit}</td>
      <td>${b.weight}</td>
      <td>${b.experience}</td>
      <td class="actions">
        <button class="${b.fit === 'yes' ? 'btn-fit-yes' : 'btn-fit-no'}" onclick="toggleFit(${b.id})">${b.fit === 'yes' ? 'Fit ✓' : 'Unfit ✗'}</button>
        <button class="btn-edit"   onclick="openModal(${b.id})">Edit</button>
        <button class="btn-delete" onclick="deleteBoxer(${b.id})">Delete</button>
      </td>
    </tr>
  `).join('');

  // Sort indicators
  document.querySelectorAll('thead th').forEach(th => th.classList.remove('sort-asc', 'sort-desc'));
  const cols = ['id','name','club','gender','yob','fit','weight','experience'];
  const idx  = cols.indexOf(sortCol);
  if (idx >= 0) document.querySelectorAll('thead th')[idx].classList.add(sortDir === 1 ? 'sort-asc' : 'sort-desc');

  const showing = document.getElementById('statShowing');
  showing.textContent = filtered.length < boxers.length
    ? `Showing ${filtered.length} of ${boxers.length}` : '';
}

function updateStats() {
  const males   = boxers.filter(b => b.gender === 'male').length;
  const females = boxers.filter(b => b.gender === 'female').length;
  const unfit   = boxers.filter(b => b.fit === 'no').length;
  document.getElementById('statTotal').textContent  = `Total: ${boxers.length}`;
  document.getElementById('statMale').textContent   = `Male: ${males}`;
  document.getElementById('statFemale').textContent = `Female: ${females}`;
  document.getElementById('statUnfit').textContent  = `Not fit: ${unfit}`;
}

function updateClubsList() {
  const clubs = [...new Set(boxers.map(b => b.club))].sort();
  document.getElementById('clubsList').innerHTML = clubs.map(c => `<option value="${escHtml(c)}">`).join('');
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Sort & filter ─────────────────────────────────────────────────────────────

function sortBy(col) {
  sortDir = (sortCol === col) ? sortDir * -1 : 1;
  sortCol = col;
  applySort();
  renderTable();
}

function applySort() {
  const dir = sortDir;
  boxers.sort((a, b) => {
    const av = a[sortCol], bv = b[sortCol];
    if (typeof av === 'number') return (av - bv) * dir;
    return String(av).localeCompare(String(bv)) * dir;
  });
  filterTable();
}

function filterTable() {
  const q = document.getElementById('searchInput').value.toLowerCase().trim();
  filtered = q
    ? boxers.filter(b =>
        b.name.toLowerCase().includes(q) ||
        b.club.toLowerCase().includes(q))
    : [...boxers];
  renderTable();
}

// ── CRUD ──────────────────────────────────────────────────────────────────────

function openModal(id) {
  editingId = id;
  document.getElementById('modalTitle').textContent = id === null ? 'Add Boxer' : 'Edit Boxer';

  if (id === null) {
    document.getElementById('f_name').value       = '';
    document.getElementById('f_club').value       = '';
    document.getElementById('f_gender').value     = 'male';
    document.getElementById('f_yob').value        = '';
    document.getElementById('f_weight').value     = '';
    document.getElementById('f_experience').value = '';
    document.getElementById('f_fit').value        = 'yes';
  } else {
    const b = boxers.find(x => x.id === id);
    document.getElementById('f_name').value       = b.name;
    document.getElementById('f_club').value       = b.club;
    document.getElementById('f_gender').value     = b.gender;
    document.getElementById('f_yob').value        = b.yob;
    document.getElementById('f_weight').value     = b.weight;
    document.getElementById('f_experience').value = b.experience;
    document.getElementById('f_fit').value        = b.fit;
  }

  document.getElementById('modalOverlay').classList.add('open');
  document.getElementById('f_name').focus();
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  editingId = null;
}

function saveRow() {
  const name       = document.getElementById('f_name').value.trim();
  const club       = document.getElementById('f_club').value.trim();
  const gender     = document.getElementById('f_gender').value;
  const yob        = parseInt(document.getElementById('f_yob').value, 10);
  const weight     = parseFloat(document.getElementById('f_weight').value);
  const experience = parseInt(document.getElementById('f_experience').value, 10);
  const fit        = document.getElementById('f_fit').value;

  if (!name)                               return flash('f_name');
  if (!club)                               return flash('f_club');
  if (!yob || yob < 1950 || yob > 2020)   return flash('f_yob');
  if (isNaN(weight) || weight < 20)        return flash('f_weight');
  if (isNaN(experience) || experience < 0) return flash('f_experience');

  if (editingId === null) {
    const newId = boxers.length ? Math.max(...boxers.map(b => b.id)) + 1 : 1;
    boxers.push({ id: newId, name, club, gender, yob, fit, weight, experience });
    showToast(`Added ${name} (ID ${newId})`);
  } else {
    const idx = boxers.findIndex(b => b.id === editingId);
    boxers[idx] = { id: editingId, name, club, gender, yob, fit, weight, experience };
    showToast(`Updated ${name}`);
  }

  closeModal();
  updateClubsList();
  applySort();
  updateStats();
}

function toggleFit(id) {
  const b = boxers.find(x => x.id === id);
  b.fit = b.fit === 'yes' ? 'no' : 'yes';
  filterTable();
  updateStats();
  showToast(`${b.name} marked as ${b.fit === 'yes' ? 'fit' : 'unfit'}`);
}

function deleteBoxer(id) {
  const b = boxers.find(x => x.id === id);
  if (!b || !confirm(`Delete ${b.name}?`)) return;
  boxers = boxers.filter(x => x.id !== id);
  filterTable();
  updateStats();
  showToast(`Deleted ${b.name}`);
}

function flash(fieldId) {
  const el = document.getElementById(fieldId);
  el.classList.add('error');
  el.focus();
  setTimeout(() => el.classList.remove('error'), 1500);
}

// ── Toast ─────────────────────────────────────────────────────────────────────

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

// ── Keyboard shortcuts ────────────────────────────────────────────────────────

document.addEventListener('keydown', e => {
  const modalOpen = document.getElementById('modalOverlay').classList.contains('open');
  if (e.key === 'Escape' && modalOpen) closeModal();
  if (e.key === 'Enter'  && modalOpen) saveRow();
  if ((e.ctrlKey || e.metaKey) && e.key === 's') { e.preventDefault(); saveFile(); }
});
</script>
</body>
</html>
