<!DOCTYPE html>
<html>
<head>
<style>
svg .edge path {
  stroke-dasharray: 300;
  stroke-dashoffset: 300;
  animation: draw 1s ease forwards;
}

svg .edge:nth-of-type(1) path { animation-delay: 0.2s; }
svg .edge:nth-of-type(2) path { animation-delay: 0.6s; }
svg .edge:nth-of-type(3) path { animation-delay: 1.0s; }
svg .edge:nth-of-type(4) path { animation-delay: 1.4s; }
svg .edge:nth-of-type(5) path { animation-delay: 1.8s; }
svg .edge:nth-of-type(6) path { animation-delay: 2.2s; }
svg .edge:nth-of-type(7) path { animation-delay: 2.6s; }

@keyframes draw {
  to {
    stroke-dashoffset: 0;
  }
}
</style>
</head>

<body>
<h2>Boxer Pairing by Category</h2>
<object type="image/svg+xml" data="boxing.svg"></object>
</body>
</html>
