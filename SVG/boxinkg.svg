<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg
  xmlns="http://www.w3.org/2000/svg"
  width="900"
  height="420"
  viewBox="0 0 900 420">

  <title>Boxer Pairing by Category</title>

  <!-- ===================== -->
  <!-- Animation definitions -->
  <!-- ===================== -->
  <style><![CDATA[
    .edge path {
      fill: none;
      stroke: #333;
      stroke-width: 1.5;
      stroke-dasharray: 300;
      stroke-dashoffset: 300;
      animation: draw 1s ease forwards;
    }

    .edge:nth-of-type(1) path { animation-delay: 0.2s; }
    .edge:nth-of-type(2) path { animation-delay: 0.5s; }
    .edge:nth-of-type(3) path { animation-delay: 0.8s; }
    .edge:nth-of-type(4) path { animation-delay: 1.1s; }
    .edge:nth-of-type(5) path { animation-delay: 1.4s; }
    .edge:nth-of-type(6) path { animation-delay: 1.7s; }
    .edge:nth-of-type(7) path { animation-delay: 2.0s; }

    @keyframes draw {
      to { stroke-dashoffset: 0; }
    }

    .node rect {
      fill: #f9f9f9;
      stroke: #333;
      stroke-width: 1.2;
      rx: 6;
      ry: 6;
    }

    .node text {
      font-family: Arial, Helvetica, sans-serif;
      font-size: 13px;
      fill: #000;
    }

    .edge text {
      font-family: Arial, Helvetica, sans-serif;
      font-size: 11px;
      fill: #555;
    }
  ]]></style>

  <!-- ===== Nodes ===== -->

  <g class="node" transform="translate(30,180)">
    <rect width="90" height="40"/>
    <text x="45" y="25" text-anchor="middle">Boxers</text>
  </g>

  <g class="node" transform="translate(170,90)">
    <rect width="90" height="40"/>
    <text x="45" y="25" text-anchor="middle">Male</text>
  </g>

  <g class="node" transform="translate(170,260)">
    <rect width="90" height="40"/>
    <text x="45" y="25" text-anchor="middle">Female</text>
  </g>

  <g class="node" transform="translate(350,30)">
    <rect width="130" height="40"/>
    <text x="65" y="25" text-anchor="middle">Male Junior</text>
  </g>

  <g class="node" transform="translate(350,100)">
    <rect width="130" height="40"/>
    <text x="65" y="25" text-anchor="middle">Male Youth</text>
  </g>

  <g class="node" transform="translate(350,170)">
    <rect width="130" height="40"/>
    <text x="65" y="25" text-anchor="middle">Male Senior</text>
  </g>

  <g class="node" transform="translate(350,240)">
    <rect width="130" height="40"/>
    <text x="65" y="25" text-anchor="middle">Female Junior</text>
  </g>

  <g class="node" transform="translate(350,310)">
    <rect width="130" height="40"/>
    <text x="65" y="25" text-anchor="middle">Female Youth</text>
  </g>

  <g class="node" transform="translate(350,380)">
    <rect width="130" height="40"/>
    <text x="65" y="25" text-anchor="middle">Female Senior</text>
  </g>

  <!-- ===== Edges ===== -->

  <g class="edge">
    <path d="M120 200 L170 110"/>
  </g>

  <g class="edge">
    <path d="M120 200 L170 280"/>
  </g>

  <g class="edge">
    <path d="M260 110 L350 50"/>
    <text x="300" y="70">&lt;15</text>
  </g>

  <g class="edge">
    <path d="M260 110 L350 120"/>
    <text x="300" y="110">16–17</text>
  </g>

  <g class="edge">
    <path d="M260 110 L350 190"/>
    <text x="300" y="160">18+</text>
  </g>

  <g class="edge">
    <path d="M260 280 L350 260"/>
    <text x="300" y="260">&lt;15</text>
  </g>

  <g class="edge">
    <path d="M260 280 L350 330"/>
    <text x="300" y="330">16–17</text>
  </g>

  <g class="edge">
    <path d="M260 280 L350 400"/>
    <text x="300" y="390">18+</text>
  </g>

</svg>
