<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Ring Manager</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f0f2f5;
    }

    /* ── Toolbar ── */
    #toolbar {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 10px 16px;
      background: var(--toolbar-bg);
      color: var(--toolbar-text);
    }
    #toolbar h1 { margin: 0; font-size: 18px; flex: 1; }
    #toolbar .stats { font-size: 13px; color: var(--toolbar-subtext); }
    #toolbar button {
      padding: 7px 16px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      font-weight: bold;
    }
    #saveBtn    { background: #2196f3; color: white; }
    #exportBtn  { background: #4caf50; color: white; }
    #resetBtn   { background: #666;    color: white; }
    #toolbar a.nav-btn {
      padding: 7px 14px; border: 1px solid var(--nav-btn-border); border-radius: 6px;
      color: var(--nav-btn-color); text-decoration: none; font-size: 13px;
      font-weight: bold; white-space: nowrap;
      transition: border-color 0.15s, color 0.15s;
    }
    #toolbar a.nav-btn:hover { border-color: var(--nav-btn-hover-border); color: var(--nav-btn-hover-color); }

    /* ── Legend ── */
    #legend {
      display: flex;
      gap: 16px;
      padding: 6px 16px;
      background: #fff;
      border-bottom: 1px solid #ddd;
      font-size: 12px;
    }
    .legend-item { display: flex; align-items: center; gap: 6px; }
    .legend-swatch {
      width: 12px; height: 12px; border-radius: 2px;
    }

    /* ── Grid wrap ── */
    #grid-wrap {
      display: flex;
      overflow: auto;
      height: calc(100vh - 90px);
    }

    /* ── Ruler ── */
    #ruler {
      flex: 0 0 54px;
      position: relative;
      background: #fff;
      border-right: 2px solid #ccc;
    }
    .tick-label {
      position: absolute;
      left: 4px;
      font-size: 10px;
      color: #555;
      transform: translateY(-50%);
      white-space: nowrap;
    }
    .tick-label.major { font-size: 11px; font-weight: bold; color: #222; }
    .tick-line { position: absolute; right: 0; height: 1px; }
    .tick-line.major { background: #666; width: 20px; }
    .tick-line.mid   { background: #999; width: 13px; }
    .tick-line.minor { background: #bbb; width: 7px; }

    /* ── Rings container ── */
    #rings {
      flex: 1;
      display: flex;
      position: relative;
      min-width: 0;
    }

    /* ── Ring column ── */
    .ring-col {
      flex: 1;
      min-width: 160px;
      border-right: 1px solid #ddd;
      position: relative;
      transition: background 0.15s, box-shadow 0.15s;
    }
    .ring-col:last-child { border-right: none; }
    .ring-col.drag-over  { background: #f0fff0; box-shadow: inset 0 0 0 2px #4caf50; }
    .ring-col.drag-block { background: #fff0f0; box-shadow: inset 0 0 0 2px #f44336; }

    .ring-col-header {
      position: sticky;
      top: 0;
      background: #1a1a2e;
      color: white;
      text-align: center;
      padding: 6px 4px;
      z-index: 10;
      border-right: 1px solid #2d3550;
    }
    .ring-col-header h2 { margin: 0; font-size: 14px; }
    .ring-col-header .hdr-info   { font-size: 10px; color: #aaa; margin-top: 2px; }
    .ring-col-header .hdr-finish { font-size: 10px; margin-top: 1px; }
    .ring-col-header .hdr-finish.ok   { color: #4caf50; }
    .ring-col-header .hdr-finish.over { color: #f44336; font-weight: bold; }

    /* ── Bout block ── */
    .bout-block {
      position: absolute;
      left: 3px;
      right: 3px;
      border-radius: 6px;
      border: 1px solid #ddd;
      border-left: 5px solid #ccc;
      background: #fafafa;
      overflow: hidden;
      padding: 7px 8px;
      z-index: 2;
      font-size: 12px;
      line-height: 1.4;
      cursor: grab;
      user-select: none;
      transition: box-shadow 0.1s, opacity 0.1s;
    }
    .bout-block:active   { cursor: grabbing; }
    .bout-block.dragging { opacity: 0.4; }
    .bout-block.senior   { border-left-color: #4a90d9; }
    .bout-block.youth    { border-left-color: #f0ad4e; }
    .bout-block.junior   { border-left-color: #5cb85c; }
    .bout-block.female   { border-left-color: #e91e8c; }

    .bb-names   { font-weight: bold; color: #222; font-size: 12px; line-height: 1.4; }
    .bb-cat     { color: #777; font-size: 10px; margin-top: 2px; }
    .bb-weight  { color: #555; font-size: 10px; margin-top: 2px; }
    .bb-time    { color: #4a90d9; font-size: 10px; margin-top: 2px; font-weight: bold; }
    .bb-format  { color: #888; font-size: 10px; margin-top: 3px; border-top: 1px solid #eee; padding-top: 3px; }

    .drop-line {
      position: absolute;
      left: 0; right: 0;
      height: 0;
      border-top: 3px solid #4caf50;
      z-index: 9;
      pointer-events: none;
    }
    .drop-time-label {
      position: absolute;
      right: 6px;
      background: #4caf50;
      color: white;
      font-size: 10px;
      font-weight: bold;
      padding: 1px 6px;
      border-radius: 3px;
      z-index: 9;
      pointer-events: none;
      transform: translateY(-50%);
    }

    /* ── Tea time line ── */
    #tea-line {
      position: absolute;
      left: 0; right: 0;
      border-top: 2px dashed #f44336;
      z-index: 8;
      pointer-events: none;
    }
    #tea-label {
      position: absolute;
      right: 6px;
      color: #f44336;
      font-size: 10px;
      font-weight: bold;
      z-index: 8;
      pointer-events: none;
    }

    /* ── Hour grid lines ── */
    .hour-line {
      position: absolute;
      left: 0; right: 0;
      border-top: 1px solid #ececec;
      pointer-events: none;
      z-index: 1;
    }

    /* ── Toast ── */
    #toast {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      background: #333; color: white; padding: 10px 20px; border-radius: 6px;
      font-size: 13px; opacity: 0; transition: opacity 0.3s; pointer-events: none;
    }
    #toast.show { opacity: 1; }
  </style>
  <link rel="stylesheet" href="theme.css">
</head>
<body>

<div id="toolbar">
  <a class="nav-btn" href="index.html">&#8592; Home</a>
  <h1>Ring Manager</h1>
  <span class="stats" id="stats"></span>
<button id="resetBtn">Reset to Auto</button>
  <button id="saveBtn">Save</button>
  <button id="exportBtn">Export Allocation</button>
  <button class="theme-btn"></button>
</div>

<div id="legend">
  <span style="font-weight:bold;font-size:12px;">Key:</span>
  <span class="legend-item"><span class="legend-swatch" style="background:#4a90d9"></span>Senior male <span style="color:#999;font-size:10px;">(YOB ≤ 2006)</span></span>
  <span class="legend-item"><span class="legend-swatch" style="background:#f0ad4e"></span>Youth male <span style="color:#999;font-size:10px;">(YOB 2007–2008)</span></span>
  <span class="legend-item"><span class="legend-swatch" style="background:#5cb85c"></span>Junior male <span style="color:#999;font-size:10px;">(YOB ≥ 2009)</span></span>
  <span class="legend-item"><span class="legend-swatch" style="background:#e91e8c"></span>Female <span style="color:#999;font-size:10px;">(either boxer)</span></span>
</div>

<div id="grid-wrap">
  <div id="ruler"></div>
  <div id="rings"></div>
</div>
<div id="toast"></div>

<script src="data-client.js"></script>
<script>
const SERVER = window.location.origin;

// ── Load & init ───────────────────────────────────────────────────────────────

async function loadSchedule() {
  try {
    return DataClient.get('schedule');
  } catch (e) {
    document.getElementById('rings').innerHTML =
      `<div style="padding:40px;color:red;font-size:14px;">
         <b>Could not load schedule_grouped.json.</b><br><br>
         Run RingAssigner.js first, then start the server:<br>
         <code>node Server.js</code>
       </div>`;
    throw e;
  }
}

// Rebuild ring queues from schedule slots
function scheduleToState(schedule) {
  const state = { R1: [], R2: [], R3: [], R4: [], R5: [] };
  for (const slot of schedule.slots) {
    for (const bout of slot.bouts) {
      state[bout.ring].push({ ...bout, slot: slot.slot });
    }
  }
  return state;
}

// ── Classification ────────────────────────────────────────────────────────────

function boutType(bout) {
  const hasFemale = b => b.gender === 'female';
  if (hasFemale(bout.red) || hasFemale(bout.blue)) return 'female';
  const yob = bout.red.yob;
  if (yob >= 2009) return 'junior';
  if (yob >= 2007) return 'youth';
  return 'senior';
}

// R5: every boxer must be female OR male junior (YOB >= 2009)
function canPlaceInR5(bout) {
  const ok = b => b.gender === 'female' || (b.gender === 'male' && b.yob >= 2009);
  return ok(bout.red) && ok(bout.blue);
}

// ── Drag state ────────────────────────────────────────────────────────────────

let dragged    = null;  // { bout, fromRing }
let dropTarget = null;  // { ringId, index }

function clearDropIndicators() {
  document.querySelectorAll('.drop-line, .drop-time-label').forEach(el => el.remove());
}

// ── Time calculation ─────────────────────────────────────────────────────────

const PX_PER_MIN = 12;
const START_MINS = 15 * 60;   // 900 — 15:00
const TEA_TIME   = 18 * 60;   // 1080 — 18:00
const CHANGEOVER = 1;         // minutes between bouts in same ring
const HEADER_PX  = 52;        // matches .ring-col-header rendered height
const GAP_PX     = 10;        // breathing room below header before first bout

function fmtTime(mins) {
  return `${Math.floor(mins / 60)}:${String(mins % 60).padStart(2, '0')}`;
}

function topPx(mins) {
  return HEADER_PX + GAP_PX + (mins - START_MINS) * PX_PER_MIN;
}

// Inverse of topPx: cursor Y inside a ring-col → minutes (clamped, 1-min snap)
function yToMins(clientY, col) {
  const localY = clientY - col.getBoundingClientRect().top;
  const raw = START_MINS + (localY - HEADER_PX - GAP_PX) / PX_PER_MIN;
  return Math.max(START_MINS, Math.round(raw));
}

function boutFormat(category) {
  const senior = category && category.includes('Senior');
  const roundLen = senior ? 3 : 2;
  const total    = senior ? 11 : 8;
  return `<span style="color:#e67e22;font-weight:bold;">${total} min</span>  |  3 × ${roundLen} min rounds  |  1 min rest  |  1 min changeover`;
}

function computeTimes(state) {
  for (const bouts of Object.values(state)) {
    let cur = START_MINS;
    for (const bout of bouts) {
      const dur         = bout.duration ?? (bout.category.includes('Senior') ? 11 : 8);
      bout.duration     = dur;
      // Honor manual pin: cur jumps forward to pinnedStart if pin is later than auto-cur
      if (bout.pinnedStart != null && bout.pinnedStart > cur) {
        cur = bout.pinnedStart;
      }
      bout.startMinutes = cur;
      bout.startTime    = fmtTime(cur);
      bout.endMinutes   = cur + dur;
      bout.endTime      = fmtTime(cur + dur);
      cur += dur + CHANGEOVER;
    }
  }
}

// ── Render ────────────────────────────────────────────────────────────────────

function buildRuler(endMins) {
  const ruler = document.getElementById('ruler');
  ruler.innerHTML = '';
  ruler.style.height = (topPx(endMins) + 40) + 'px';

  for (let m = START_MINS; m <= endMins + 15; m += 5) {
    const major = m % 60 === 0;
    const mid   = !major && m % 15 === 0;
    const y     = topPx(m);

    const line = document.createElement('div');
    line.className = `tick-line ${major ? 'major' : mid ? 'mid' : 'minor'}`;
    line.style.top = y + 'px';
    ruler.appendChild(line);

    if (major || mid) {
      const label = document.createElement('div');
      label.className = `tick-label${major ? ' major' : ''}`;
      label.style.top = y + 'px';
      label.textContent = fmtTime(m);
      ruler.appendChild(label);
    }
  }
}

function render(state) {
  computeTimes(state);

  // Determine grid height (latest finish + a 15-min tail)
  let endMins = TEA_TIME;
  for (const bouts of Object.values(state)) {
    if (bouts.length) endMins = Math.max(endMins, bouts[bouts.length - 1].endMinutes);
  }
  endMins += 15;
  const colHeight = topPx(endMins) + 40;

  const rings = document.getElementById('rings');
  rings.innerHTML = '';

  // Tea-time line + label (span all columns inside #rings)
  const teaLine = document.createElement('div');
  teaLine.id = 'tea-line';
  teaLine.style.top = topPx(TEA_TIME) + 'px';
  rings.appendChild(teaLine);

  const teaLabel = document.createElement('div');
  teaLabel.id = 'tea-label';
  teaLabel.style.top = (topPx(TEA_TIME) - 16) + 'px';
  teaLabel.textContent = '18:00 — Tea Time';
  rings.appendChild(teaLabel);

  ['R1', 'R2', 'R3', 'R4', 'R5'].forEach(ringId => {
    const bouts    = state[ringId];
    const lastBout = bouts[bouts.length - 1];
    const overrun  = lastBout ? lastBout.endMinutes > TEA_TIME : false;

    const col = document.createElement('div');
    col.className = 'ring-col';
    col.dataset.ring = ringId;
    col.style.height = colHeight + 'px';

    // Sticky header
    const hdr = document.createElement('div');
    hdr.className = 'ring-col-header';
    hdr.innerHTML = `
      <h2>${ringId}${ringId === 'R5' ? ' <small style="font-size:10px;opacity:.5">(Y/J/F)</small>' : ''}</h2>
      <div class="hdr-info">${bouts.length} bout${bouts.length !== 1 ? 's' : ''}</div>
      <div class="hdr-finish ${overrun ? 'over' : 'ok'}">${overrun ? '⚠' : '✓'} ${lastBout ? lastBout.endTime : '—'}</div>
    `;
    col.appendChild(hdr);

    // Hour grid lines
    for (let m = START_MINS; m <= endMins; m += 60) {
      const line = document.createElement('div');
      line.className = 'hour-line';
      line.style.top = topPx(m) + 'px';
      col.appendChild(line);
    }

    // Column-level drop handlers (time-based)
    col.addEventListener('dragover', e => {
      if (!dragged) return;
      e.preventDefault();
      const allowed = ringId !== 'R5' || canPlaceInR5(dragged.bout);
      col.classList.toggle('drag-over',  allowed);
      col.classList.toggle('drag-block', !allowed);

      const pinnedStart = yToMins(e.clientY, col);
      dropTarget = { ringId, pinnedStart };

      // Indicator: horizontal line + time label at the drop Y
      clearDropIndicators();
      if (allowed) {
        const line = document.createElement('div');
        line.className = 'drop-line';
        line.style.top = topPx(pinnedStart) + 'px';
        col.appendChild(line);

        const label = document.createElement('div');
        label.className = 'drop-time-label';
        label.style.top = topPx(pinnedStart) + 'px';
        label.textContent = fmtTime(pinnedStart);
        col.appendChild(label);
      }
    });

    col.addEventListener('dragleave', e => {
      if (!col.contains(e.relatedTarget)) {
        col.classList.remove('drag-over', 'drag-block');
        clearDropIndicators();
      }
    });

    col.addEventListener('drop', e => {
      e.preventDefault();
      col.classList.remove('drag-over', 'drag-block');
      clearDropIndicators();
      if (!dragged) return;

      const { bout, fromRing } = dragged;

      if (ringId === 'R5' && !canPlaceInR5(bout)) {
        showToast(`⚠ ${bout.red.name} (senior male) cannot be placed in R5`);
        return;
      }

      const pinnedStart = dropTarget?.ringId === ringId
        ? dropTarget.pinnedStart
        : yToMins(e.clientY, col);

      // Remove from source ring
      state[fromRing] = state[fromRing].filter(b => b.sparId !== bout.sparId);

      // Apply the pin
      bout.pinnedStart = pinnedStart;

      // Insert at the chronological index in the target ring
      const dest = state[ringId];
      let insertIdx = dest.length;
      for (let i = 0; i < dest.length; i++) {
        const otherStart = dest[i].pinnedStart ?? dest[i].startMinutes;
        if (otherStart >= pinnedStart) { insertIdx = i; break; }
      }
      dest.splice(insertIdx, 0, bout);

      render(state);
      updateStats(state);
    });

    // Bout blocks (DnD wired)
    bouts.forEach((bout, idx) => {
      const block = document.createElement('div');
      block.className = `bout-block ${boutType(bout)}`;
      block.draggable = true;
      block.style.top    = topPx(bout.startMinutes) + 'px';
      block.style.height = (bout.duration * PX_PER_MIN) + 'px';
      block.innerHTML = `
        <div class="bb-names">${bout.red.name}<br>vs ${bout.blue.name}</div>
        <div class="bb-cat">${bout.category}</div>
        <div class="bb-weight">⚖ ${bout.weightDiff}kg diff</div>
        <div class="bb-time">⏱ ${bout.startTime} – ${bout.endTime}</div>
        <div class="bb-format">${boutFormat(bout.category)}</div>
      `;

      block.addEventListener('dragstart', e => {
        dragged = { bout, fromRing: ringId };
        block.classList.add('dragging');
        if (e.dataTransfer) e.dataTransfer.effectAllowed = 'move';
      });
      block.addEventListener('dragend', () => {
        dragged = null;
        block.classList.remove('dragging');
        clearDropIndicators();
        document.querySelectorAll('.ring-col.drag-over, .ring-col.drag-block')
          .forEach(c => c.classList.remove('drag-over', 'drag-block'));
      });
      col.appendChild(block);
    });

    rings.appendChild(col);
  });

  buildRuler(endMins);
}

function updateStats(state) {
  const total    = Object.values(state).reduce((n, r) => n + r.length, 0);
  const maxSlots = Math.max(...Object.values(state).map(r => r.length));

  const latestMins = Math.max(
    ...Object.values(state).map(r => r.length ? r[r.length - 1].endMinutes : START_MINS)
  );
  const latestLabel = fmtTime(latestMins);
  const overrun     = latestMins > TEA_TIME;

  document.getElementById('stats').innerHTML =
    `${total} bouts &nbsp;·&nbsp; ${maxSlots} slots &nbsp;·&nbsp; ` +
    `<span style="color:${overrun ? '#f44336' : '#4caf50'};font-weight:bold;">` +
    `${overrun ? '⚠' : '✓'} Latest finish ${latestLabel}</span>`;
}

// ── Save ──────────────────────────────────────────────────────────────────────

async function saveToServer(state) {
  const rings = ['R1', 'R2', 'R3', 'R4', 'R5'];
  const maxSlots = Math.max(...rings.map(r => state[r].length));
  const slots = [];
  for (let i = 0; i < maxSlots; i++) {
    const bouts = [];
    for (const ring of rings) {
      const b = state[ring][i];
      if (b) bouts.push({ ring, sparId: b.sparId, category: b.category,
                          red: b.red, blue: b.blue, weightDiff: b.weightDiff });
    }
    slots.push({ slot: i + 1, bouts });
  }
  const total   = Object.values(state).reduce((n, r) => n + r.length, 0);
  const payload = { summary: { strategy: 'MANUAL', totalMatches: total }, slots };
  try {
    await DataClient.save('schedule', payload);
    showToast('✓ Saved to server');
  } catch {
    const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'schedule_grouped.json';
    a.click();
    showToast('Server unavailable — downloaded schedule_grouped.json');
  }
}

// ── Export ────────────────────────────────────────────────────────────────────

function exportAllocation(state) {
  const rings = ['R1', 'R2', 'R3', 'R4', 'R5'];

  // Rebuild slots from current ring state
  const maxSlots = Math.max(...rings.map(r => state[r].length));
  const slots = [];

  for (let i = 0; i < maxSlots; i++) {
    const bouts = [];
    for (const ring of rings) {
      const b = state[ring][i];
      if (b) bouts.push({ ring, sparId: b.sparId, category: b.category,
                          red: b.red, blue: b.blue, weightDiff: b.weightDiff });
    }
    slots.push({ slot: i + 1, bouts });
  }

  const flat = slots.flatMap(s =>
    s.bouts.map(b => ({
      slot: s.slot, ring: b.ring, sparId: b.sparId, category: b.category,
      red:  `${b.red.name} (${b.red.club})`,
      blue: `${b.blue.name} (${b.blue.club})`,
      weightDiff: b.weightDiff
    }))
  );

  const blob = new Blob([JSON.stringify({ slots, allocations: flat }, null, 2)],
                        { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'spar_allocation_manual.json';
  a.click();
  showToast('✓ Exported spar_allocation_manual.json');
}

// ── Toast ─────────────────────────────────────────────────────────────────────

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

// ── Boot ─────────────────────────────────────────────────────────────────────

(async () => {
  let schedule = await loadSchedule();
  if (!schedule) {
    showToast('Generating ring schedule…');
    try {
      const res = await fetch('/api/generate-schedule', { method: 'POST' });
      if (!res.ok) throw new Error((await res.json().catch(() => ({}))).error || res.statusText);
      schedule = await res.json();
    } catch (e) {
      document.getElementById('rings').innerHTML =
        `<div style="padding:40px;color:#888;font-size:14px;">
           <b>Could not generate schedule: ${e.message}</b><br><br>
           Go to <a href="SparManager.html" style="color:#4a90d9;">Spar Manager</a> first.
         </div>`;
      return;
    }
  }
  const initialState = scheduleToState(schedule);
  let   state        = JSON.parse(JSON.stringify(initialState)); // deep copy for reset

  render(state);
  updateStats(state);

  document.getElementById('resetBtn').addEventListener('click', () => {
    state = JSON.parse(JSON.stringify(initialState));
    render(state);
    updateStats(state);
    showToast('Reset to auto allocation');
  });

  document.getElementById('saveBtn').addEventListener('click', () => saveToServer(state));
  document.getElementById('exportBtn').addEventListener('click', () => exportAllocation(state));
})();
</script>
<script src="theme.js"></script>
</body>
</html>
