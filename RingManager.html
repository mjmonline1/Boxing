<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Ring Manager</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f0f2f5;
    }

    /* ── Toolbar ── */
    #toolbar {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 10px 16px;
      background: var(--toolbar-bg);
      color: var(--toolbar-text);
    }
    #toolbar h1 { margin: 0; font-size: 18px; flex: 1; }
    #toolbar .stats { font-size: 13px; color: var(--toolbar-subtext); }
    #toolbar button {
      padding: 7px 16px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      font-weight: bold;
    }
    #regenBtn   { background: #9c27b0; color: white; }
    #saveBtn    { background: #2196f3; color: white; }
    #exportBtn  { background: #4caf50; color: white; }
    #resetBtn   { background: #666;    color: white; }
    #toolbar a.nav-btn {
      padding: 7px 14px; border: 1px solid var(--nav-btn-border); border-radius: 6px;
      color: var(--nav-btn-color); text-decoration: none; font-size: 13px;
      font-weight: bold; white-space: nowrap;
      transition: border-color 0.15s, color 0.15s;
    }
    #toolbar a.nav-btn:hover { border-color: var(--nav-btn-hover-border); color: var(--nav-btn-hover-color); }

    /* ── Legend ── */
    #legend {
      display: flex;
      gap: 16px;
      padding: 6px 16px;
      background: #fff;
      border-bottom: 1px solid #ddd;
      font-size: 12px;
    }
    .legend-item { display: flex; align-items: center; gap: 6px; }
    .legend-swatch {
      width: 12px; height: 12px; border-radius: 2px;
    }

    /* ── Board ── */
    #board {
      display: flex;
      gap: 10px;
      padding: 12px;
      overflow: auto;
      height: calc(100vh - 90px);
      align-items: flex-start;
    }

    /* ── Ring column ── */
    .ring {
      flex: 0 0 220px;
      background: white;
      border: 2px solid #ccc;
      border-radius: 10px;
      padding: 0;
      min-height: 200px;
      display: flex;
      flex-direction: column;
      transition: border-color 0.15s;
    }
    .ring.drag-over  { border-color: #4caf50; background: #f0fff0; }
    .ring.drag-block { border-color: #f44336; background: #fff0f0; }

    .ring-header {
      padding: 10px 12px 8px;
      border-bottom: 2px solid #eee;
      border-radius: 8px 8px 0 0;
      background: #1a1a2e;
      color: white;
      position: sticky;
      top: 0;
      z-index: 5;
    }
    .ring-header h2 { margin: 0; font-size: 15px; }
    .ring-header .ring-count { font-size: 12px; color: #aaa; margin-top: 2px; }
    .ring-header .ring-finish { font-size: 11px; margin-top: 3px; }
    .ring-header .ring-finish.ok   { color: #4caf50; }
    .ring-header .ring-finish.over { color: #f44336; font-weight: bold; }

    .ring-body {
      padding: 8px;
      flex: 1;
    }

    /* ── Bout card ── */
    .bout {
      background: #fafafa;
      border: 1px solid #ddd;
      border-left: 5px solid #ccc;
      border-radius: 6px;
      padding: 7px 8px;
      margin-bottom: 7px;
      cursor: grab;
      font-size: 12px;
      line-height: 1.4;
      user-select: none;
      transition: box-shadow 0.1s, opacity 0.1s;
    }
    .bout:active  { cursor: grabbing; }
    .bout.dragging { opacity: 0.4; }

    .bout.senior  { border-left-color: #4a90d9; }
    .bout.junior  { border-left-color: #5cb85c; }
    .bout.youth   { border-left-color: #f0ad4e; }
    .bout.female  { border-left-color: #e91e8c; }

    .bout-pos    { font-size: 10px; color: #999; float: right; }
    .bout-names  { font-weight: bold; color: #222; }
    .bout-cat    { font-size: 10px; color: #777; margin-top: 2px; }
    .bout-weight { font-size: 10px; color: #555; margin-top: 2px; }
    .bout-time   { font-size: 10px; color: #4a90d9; margin-top: 2px; font-weight: bold; }
    .bout-format { font-size: 10px; color: #888; margin-top: 3px; border-top: 1px solid #eee; padding-top: 3px; }
    .bout.drop-before { border-top: 3px solid #4caf50; }
    .bout.drop-after  { border-bottom: 3px solid #4caf50; }

    /* ── Toast ── */
    #toast {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      background: #333; color: white; padding: 10px 20px; border-radius: 6px;
      font-size: 13px; opacity: 0; transition: opacity 0.3s; pointer-events: none;
    }
    #toast.show { opacity: 1; }
  </style>
  <link rel="stylesheet" href="theme.css">
</head>
<body>

<div id="toolbar">
  <a class="nav-btn" href="index.html">&#8592; Home</a>
  <h1>Ring Manager</h1>
  <span class="stats" id="stats"></span>
  <button id="regenBtn">&#8635; Re-run from Spars</button>
  <button id="resetBtn">Reset to Auto</button>
  <button id="saveBtn">Save</button>
  <button id="exportBtn">Export Allocation</button>
  <button class="theme-btn"></button>
  <a class="nav-btn" href="TimelineView.html">Timeline &#8594;</a>
</div>

<div id="legend">
  <span style="font-weight:bold;font-size:12px;">Key:</span>
  <span class="legend-item"><span class="legend-swatch" style="background:#4a90d9"></span>Senior male <span style="color:#999;font-size:10px;">(YOB ≤ 2006)</span></span>
  <span class="legend-item"><span class="legend-swatch" style="background:#f0ad4e"></span>Youth male <span style="color:#999;font-size:10px;">(YOB 2007–2008)</span></span>
  <span class="legend-item"><span class="legend-swatch" style="background:#5cb85c"></span>Junior male <span style="color:#999;font-size:10px;">(YOB ≥ 2009)</span></span>
  <span class="legend-item"><span class="legend-swatch" style="background:#e91e8c"></span>Female <span style="color:#999;font-size:10px;">(either boxer)</span></span>
</div>

<div id="board"></div>
<div id="toast"></div>

<script src="data-client.js"></script>
<script>
const SERVER = window.location.origin;

// ── Load & init ───────────────────────────────────────────────────────────────

async function loadSchedule() {
  try {
    return DataClient.get('schedule');
  } catch (e) {
    document.getElementById('board').innerHTML =
      `<div style="padding:40px;color:red;font-size:14px;">
         <b>Could not load schedule_grouped.json.</b><br><br>
         Run RingAssigner.js first, then start the server:<br>
         <code>node Server.js</code>
       </div>`;
    throw e;
  }
}

// Rebuild ring queues from schedule slots
function scheduleToState(schedule) {
  const state = { R1: [], R2: [], R3: [], R4: [], R5: [] };
  for (const slot of schedule.slots) {
    for (const bout of slot.bouts) {
      state[bout.ring].push({ ...bout, slot: slot.slot });
    }
  }
  return state;
}

// ── Classification ────────────────────────────────────────────────────────────

function boutType(bout) {
  const hasFemale = b => b.gender === 'female';
  if (hasFemale(bout.red) || hasFemale(bout.blue)) return 'female';
  const yob = bout.red.yob;
  if (yob >= 2009) return 'junior';
  if (yob >= 2007) return 'youth';
  return 'senior';
}

// R5: every boxer must be female OR male junior (YOB >= 2009)
function canPlaceInR5(bout) {
  const ok = b => b.gender === 'female' || (b.gender === 'male' && b.yob >= 2009);
  return ok(bout.red) && ok(bout.blue);
}

// ── Drag state ────────────────────────────────────────────────────────────────

let dragged    = null;  // { bout, fromRing }
let dropTarget = null;  // { ringId, index }

function clearDropIndicators() {
  document.querySelectorAll('.bout.drop-before, .bout.drop-after')
    .forEach(el => el.classList.remove('drop-before', 'drop-after'));
}

// ── Time calculation ─────────────────────────────────────────────────────────

const START_MINUTES = 15 * 60; // 3:00 PM
const CHANGEOVER    = 1;       // minutes between bouts in same ring

function fmtTime(mins) {
  return `${Math.floor(mins / 60)}:${String(mins % 60).padStart(2, '0')}`;
}

const TEA_TIME = 18 * 60; // 18:00

function boutFormat(category) {
  const senior = category && category.includes('Senior');
  const roundLen = senior ? 3 : 2;
  const total    = senior ? 11 : 8;
  return `<span style="color:#e67e22;font-weight:bold;">${total} min</span>  |  3 × ${roundLen} min rounds  |  1 min rest  |  1 min changeover`;
}

function computeTimes(state) {
  for (const bouts of Object.values(state)) {
    let cur = START_MINUTES;
    for (const bout of bouts) {
      const dur = bout.duration ?? (bout.category.includes('Senior') ? 11 : 8);
      bout.startTime  = fmtTime(cur);
      bout.endMinutes = cur + dur;
      bout.endTime    = fmtTime(bout.endMinutes);
      cur += dur + CHANGEOVER;
    }
  }
}

// ── Render ────────────────────────────────────────────────────────────────────

function render(state) {
  computeTimes(state);
  const board = document.getElementById('board');
  board.innerHTML = '';

  const rings = ['R1', 'R2', 'R3', 'R4', 'R5'];

  rings.forEach(ringId => {
    const bouts = state[ringId];

    const col = document.createElement('div');
    col.className = 'ring';
    col.dataset.ring = ringId;

    const lastBout    = bouts[bouts.length - 1];
    const finishMins  = lastBout ? lastBout.endMinutes : START_MINUTES;
    const finishLabel = lastBout ? lastBout.endTime : '—';
    const overrun     = finishMins > TEA_TIME;

    col.innerHTML = `
      <div class="ring-header">
        <h2>${ringId}${ringId === 'R5' ? ' <small style="font-size:11px;opacity:.6">(Youth/Junior/F)</small>' : ''}</h2>
        <div class="ring-count">${bouts.length} bout${bouts.length !== 1 ? 's' : ''}</div>
        <div class="ring-finish ${overrun ? 'over' : 'ok'}">
          ${overrun ? '⚠ Overruns' : '✓ Done'} ${finishLabel}
        </div>
      </div>
      <div class="ring-body" data-ring="${ringId}"></div>
    `;

    const body = col.querySelector('.ring-body');

    // Drop handlers
    col.addEventListener('dragover', e => {
      e.preventDefault();
      const allowed = ringId !== 'R5' || canPlaceInR5(dragged?.bout);
      col.classList.toggle('drag-over',  allowed);
      col.classList.toggle('drag-block', !allowed);
      // When hovering empty space below all cards, target end of list
      if (!e.target.closest('.bout')) {
        clearDropIndicators();
        dropTarget = { ringId, index: state[ringId].length };
      }
    });

    col.addEventListener('dragleave', e => {
      if (!col.contains(e.relatedTarget)) {
        col.classList.remove('drag-over', 'drag-block');
        clearDropIndicators();
      }
    });

    col.addEventListener('drop', e => {
      e.preventDefault();
      col.classList.remove('drag-over', 'drag-block');
      clearDropIndicators();
      if (!dragged) return;

      const { bout, fromRing } = dragged;

      if (ringId === 'R5' && !canPlaceInR5(bout)) {
        showToast(`⚠ ${bout.red.name} (senior male) cannot be placed in R5`);
        return;
      }

      const origIdx = state[fromRing].findIndex(b => b.sparId === bout.sparId);
      state[fromRing] = state[fromRing].filter(b => b.sparId !== bout.sparId);

      let insertIdx = dropTarget?.ringId === ringId ? dropTarget.index : state[ringId].length;
      // If reordering within same ring and the removal shifted positions, adjust
      if (fromRing === ringId && origIdx < insertIdx) insertIdx--;
      insertIdx = Math.max(0, Math.min(insertIdx, state[ringId].length));

      state[ringId].splice(insertIdx, 0, bout);

      render(state);
      updateStats(state);
    });

    // Bout cards
    bouts.forEach((bout, idx) => {
      const type = boutType(bout);
      const card = document.createElement('div');
      card.className = `bout ${type}`;
      card.draggable = true;

      card.innerHTML = `
        <span class="bout-pos">#${idx + 1}</span>
        <div class="bout-names">${bout.red.name}<br>vs ${bout.blue.name}</div>
        <div class="bout-cat">${bout.category}</div>
        <div class="bout-weight">⚖ ${bout.weightDiff}kg diff</div>
        <div class="bout-time">⏱ ${bout.startTime} – ${bout.endTime}</div>
        <div class="bout-format">${boutFormat(bout.category)}</div>
      `;

      card.addEventListener('dragstart', () => {
        dragged = { bout, fromRing: ringId };
        card.classList.add('dragging');
      });
      card.addEventListener('dragend', () => {
        dragged = null;
        card.classList.remove('dragging');
        clearDropIndicators();
      });
      card.addEventListener('dragover', e => {
        e.preventDefault();
        const rect        = card.getBoundingClientRect();
        const insertBefore = e.clientY < rect.top + rect.height / 2;
        dropTarget = { ringId, index: insertBefore ? idx : idx + 1 };
        clearDropIndicators();
        card.classList.add(insertBefore ? 'drop-before' : 'drop-after');
      });

      body.appendChild(card);
    });

    board.appendChild(col);
  });
}

function updateStats(state) {
  const total    = Object.values(state).reduce((n, r) => n + r.length, 0);
  const maxSlots = Math.max(...Object.values(state).map(r => r.length));

  const latestMins = Math.max(
    ...Object.values(state).map(r => r.length ? r[r.length - 1].endMinutes : START_MINUTES)
  );
  const latestLabel = fmtTime(latestMins);
  const overrun     = latestMins > TEA_TIME;

  document.getElementById('stats').innerHTML =
    `${total} bouts &nbsp;·&nbsp; ${maxSlots} slots &nbsp;·&nbsp; ` +
    `<span style="color:${overrun ? '#f44336' : '#4caf50'};font-weight:bold;">` +
    `${overrun ? '⚠' : '✓'} Latest finish ${latestLabel}</span>`;
}

// ── Save ──────────────────────────────────────────────────────────────────────

async function saveToServer(state) {
  const rings = ['R1', 'R2', 'R3', 'R4', 'R5'];
  const maxSlots = Math.max(...rings.map(r => state[r].length));
  const slots = [];
  for (let i = 0; i < maxSlots; i++) {
    const bouts = [];
    for (const ring of rings) {
      const b = state[ring][i];
      if (b) bouts.push({ ring, sparId: b.sparId, category: b.category,
                          red: b.red, blue: b.blue, weightDiff: b.weightDiff });
    }
    slots.push({ slot: i + 1, bouts });
  }
  const total   = Object.values(state).reduce((n, r) => n + r.length, 0);
  const payload = { summary: { strategy: 'MANUAL', totalMatches: total }, slots };
  try {
    await DataClient.save('schedule', payload);
    showToast('✓ Saved to server');
  } catch {
    const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'schedule_grouped.json';
    a.click();
    showToast('Server unavailable — downloaded schedule_grouped.json');
  }
}

// ── Export ────────────────────────────────────────────────────────────────────

function exportAllocation(state) {
  const rings = ['R1', 'R2', 'R3', 'R4', 'R5'];

  // Rebuild slots from current ring state
  const maxSlots = Math.max(...rings.map(r => state[r].length));
  const slots = [];

  for (let i = 0; i < maxSlots; i++) {
    const bouts = [];
    for (const ring of rings) {
      const b = state[ring][i];
      if (b) bouts.push({ ring, sparId: b.sparId, category: b.category,
                          red: b.red, blue: b.blue, weightDiff: b.weightDiff });
    }
    slots.push({ slot: i + 1, bouts });
  }

  const flat = slots.flatMap(s =>
    s.bouts.map(b => ({
      slot: s.slot, ring: b.ring, sparId: b.sparId, category: b.category,
      red:  `${b.red.name} (${b.red.club})`,
      blue: `${b.blue.name} (${b.blue.club})`,
      weightDiff: b.weightDiff
    }))
  );

  const blob = new Blob([JSON.stringify({ slots, allocations: flat }, null, 2)],
                        { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'spar_allocation_manual.json';
  a.click();
  showToast('✓ Exported spar_allocation_manual.json');
}

// ── Toast ─────────────────────────────────────────────────────────────────────

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

// ── Boot ─────────────────────────────────────────────────────────────────────

(async () => {
  const schedule = await loadSchedule();
  if (!schedule) {
    document.getElementById('board').innerHTML =
      `<div style="padding:40px;color:#888;font-size:14px;">
         <b>No schedule in database yet.</b><br><br>
         Run <code>node SparMaker.js</code> then <code>node RingAssigner.js</code>
         locally, open this page via <code>node Server.js</code>, and click
         <b>Save</b> once to push the schedule to the database.
       </div>`;
    return;
  }
  const initialState = scheduleToState(schedule);
  let   state        = JSON.parse(JSON.stringify(initialState)); // deep copy for reset

  render(state);
  updateStats(state);

  document.getElementById('resetBtn').addEventListener('click', () => {
    state = JSON.parse(JSON.stringify(initialState));
    render(state);
    updateStats(state);
    showToast('Reset to auto allocation');
  });

  document.getElementById('saveBtn').addEventListener('click', () => saveToServer(state));
  document.getElementById('exportBtn').addEventListener('click', () => exportAllocation(state));

  document.getElementById('regenBtn').addEventListener('click', async () => {
    document.getElementById('regenBtn').disabled = true;
    showToast('Running RingAssigner…');
    try {
      const res = await fetch(`${SERVER}/api/run/ring-assigner`, { method: 'POST',
        headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ day: 1 }) });
      if (!res.ok) throw new Error();
      const freshSchedule = await loadSchedule();
      const freshInitial  = scheduleToState(freshSchedule);
      state = JSON.parse(JSON.stringify(freshInitial));
      render(state);
      updateStats(state);
      showToast('✓ Schedule regenerated from Spars.json');
    } catch {
      showToast('⚠ Server unavailable — run node RingAssigner.js manually');
    } finally {
      document.getElementById('regenBtn').disabled = false;
    }
  });
})();
</script>
<script src="theme.js"></script>
</body>
</html>
