<script src="data-client.js"></script>
<script src="constants.js"></script>
<script src="group-utils.js"></script>
<script src="ring-clash.js"></script>
<script>
const SERVER = window.location.origin;

// ── Load & init ───────────────────────────────────────────────────────────────

// ── Date picker ───────────────────────────────────────────────────────────────

const dateSelect = document.getElementById('dateSelect');
const _today = new Date().toISOString().split('T')[0];

async function initDatePicker() {
  const dates = await DataClient.getDates('schedule').catch(() => []);
  const all = [...new Set([_today, ...dates])].sort().reverse();
  // Default to the most recent date that actually has a schedule; only fall back
  // to today when none exists yet.
  const sel = dates.length ? [...dates].sort().reverse()[0] : _today;
  dateSelect.innerHTML = all.map(d =>
    `<option value="${d}"${d === sel ? ' selected' : ''}>${d}</option>`
  ).join('');
}

function getSelectedDate() { return dateSelect.value || _today; }

async function loadSchedule() {
  try {
    return DataClient.get('schedule', { date: getSelectedDate() });
  } catch (e) {
    document.getElementById('rings').innerHTML =
      `<div class="error-msg">
         <b>Could not load schedule_grouped.json.</b><br><br>
         Run RingAssigner.js first, then start the server:<br>
         <code>node Server.js</code>
       </div>`;
    throw e;
  }
}

// Rebuild ring queues from schedule slots
function scheduleToState(schedule) {
  const state = { R1: [], R2: [], R3: [], R4: [], R5: [] };
  for (const slot of schedule.slots) {
    for (const bout of slot.bouts) {
      state[bout.ring].push({ ...bout, slot: slot.slot });
    }
  }
  return state;
}

// ── Classification ────────────────────────────────────────────────────────────

function boutType(bout) {
  const hasFemale = b => b.gender === 'female';
  if (GroupUtils.membersOf(bout).some(hasFemale)) return 'female';
  const yob = bout.red.yob;
  const ag = AGE_GROUPS.find(a => a.yobMin !== null ? yob >= a.yobMin && yob <= a.yobMax : yob <= a.yobMax);
  return ag ? ag.label.toLowerCase() : 'senior';
}

function boutHTML(bout) {
  if (GroupUtils.isGroup(bout)) {
    const members = GroupUtils.membersOf(bout);
    const pairs    = GroupUtils.generateBouts(members);
    const names    = pairs.map(([a, b]) => `${a.name} vs ${b.name}`);
    const diffs    = pairs.map(([a, b]) => Math.abs(a.weight - b.weight).toFixed(2));
    return `
      <div class="bb-names">
        ${names.join('<br>')}
      </div>
      <div class="bb-cat">${bout.category} <span class="group-badge">GROUP</span></div>
      <div class="bb-weight">⚖ ${diffs.join(' / ')} kg diff</div>
      <div class="bb-time">⏱ ${bout.startTime} – ${bout.endTime}</div>
      <div class="bb-format">${boutFormat(bout.category, pairs.length)}</div>
    `;
  }
  return `
    <div class="bb-names">${bout.red.name}<br>vs ${bout.blue.name}</div>
    <div class="bb-cat">${bout.category}</div>
    <div class="bb-weight">⚖ ${bout.weightDiff}kg diff</div>
    <div class="bb-time">⏱ ${bout.startTime} – ${bout.endTime}</div>
    <div class="bb-format">${boutFormat(bout.category)}</div>
  `;
}

// R5: every boxer must be female OR male Schools/Junior (YOB >= R5_ELIGIBLE_YOB_MIN)
function canPlaceInR5(bout) {
  const ok = b => b.gender === 'female' || (b.gender === 'male' && b.yob >= R5_ELIGIBLE_YOB_MIN);
  return GroupUtils.membersOf(bout).every(ok);
}

// ── Drag state ────────────────────────────────────────────────────────────────

let dragged    = null;  // { bout, fromRing }
let dropTarget = null;  // { ringId, index }

// Cross-ring double-booking state, recomputed each render() and read by updateStats()
let clashCount = 0;
let clashKeys  = new Set();   // `${ring}|${sparId}` of bouts involved in a clash
let clashTips  = new Map();   // `${ring}|${sparId}` → tooltip text

// Consecutive-slot warning state (a fighter in slot i and slot i+1, same or different
// ring — back-to-back with no rest slot between). Slot = position across ring queues.
let consecCount = 0;
let consecKeys  = new Set();   // `${ring}|${sparId}` of bouts in a consecutive-slot pair
let consecTips  = new Map();   // `${ring}|${sparId}` → tooltip text

function clearDropIndicators() {
  document.querySelectorAll('.drop-line, .drop-time-label').forEach(el => el.remove());
}

// ── Time calculation ─────────────────────────────────────────────────────────

const PX_PER_MIN = 12;
const START_MINS = 16 * 60;   // 960 — 16:00
const TEA_TIME   = 18 * 60;   // 1080 — 18:00
const CHANGEOVER = 1;         // minutes between bouts in same ring
const HEADER_PX  = 52;        // matches .ring-col-header rendered height
const GAP_PX     = 10;        // breathing room below header before first bout

function fmtTime(mins) {
  return `${Math.floor(mins / 60)}:${String(mins % 60).padStart(2, '0')}`;
}

function topPx(mins) {
  return HEADER_PX + GAP_PX + (mins - START_MINS) * PX_PER_MIN;
}

// Inverse of topPx: cursor Y inside a ring-col → minutes (clamped, 1-min snap)
function yToMins(clientY, col) {
  const localY = clientY - col.getBoundingClientRect().top;
  const raw = START_MINS + (localY - HEADER_PX - GAP_PX) / PX_PER_MIN;
  return Math.max(START_MINS, Math.round(raw));
}

function boutFormat(category, boutCount) {
  const senior = category && category.includes('Senior');
  const roundLen = senior ? 3 : 2;
  const total    = senior ? 11 : 8;
  const groupNote = boutCount > 1 ? ` &middot; ${boutCount}&times; bouts, ${total * boutCount} min total` : '';
  return `<span class="bout-duration">${total} min</span>  |  3 × ${roundLen} min rounds  |  1 min rest  |  1 min changeover${groupNote}`;
}

function computeTimes(state) {
  for (const bouts of Object.values(state)) {
    let cur = START_MINS;
    for (const bout of bouts) {
      const single = bout.category.includes('Senior') ? 11 : 8;
      // Always derive from current members so the card resizes when a fighter is
      // added/removed — a stale cached duration would freeze the block height.
      const dur     = single * GroupUtils.boutCount(GroupUtils.membersOf(bout));
      bout.duration     = dur;
      // Honor manual pin: cur jumps forward to pinnedStart if pin is later than auto-cur
      if (bout.pinnedStart != null && bout.pinnedStart > cur) {
        cur = bout.pinnedStart;
      }
      bout.startMinutes = cur;
      bout.startTime    = fmtTime(cur);
      bout.endMinutes   = cur + dur;
      bout.endTime      = fmtTime(cur + dur);
      cur += dur + CHANGEOVER;
    }
  }
}

// ── Render ────────────────────────────────────────────────────────────────────

function buildRuler(endMins) {
  const ruler = document.getElementById('ruler');
  ruler.innerHTML = '';
  ruler.style.height = (topPx(endMins) + 40) + 'px';

  for (let m = START_MINS; m <= endMins + 15; m += 5) {
    const major = m % 60 === 0;
    const mid   = !major && m % 15 === 0;
    const y     = topPx(m);

    const line = document.createElement('div');
    line.className = `tick-line ${major ? 'major' : mid ? 'mid' : 'minor'}`;
    line.style.top = y + 'px';
    ruler.appendChild(line);

    if (major || mid) {
      const label = document.createElement('div');
      label.className = `tick-label${major ? ' major' : ''}`;
      label.style.top = y + 'px';
      label.textContent = fmtTime(m);
      ruler.appendChild(label);
    }
  }
}

function render(state) {
  computeTimes(state);

  // Detect fighters double-booked across rings at overlapping times. computeTimes
  // just set startMinutes/endMinutes (honoring live pins), so times are exact here.
  const clashEntries = [];
  for (const ringId of ['R1', 'R2', 'R3', 'R4', 'R5']) {
    for (const bout of state[ringId]) {
      for (const m of GroupUtils.membersOf(bout)) {
        clashEntries.push({ id: m.id, name: m.name, club: m.club, ring: ringId,
                            start: bout.startMinutes, end: bout.endMinutes, sparId: bout.sparId });
      }
    }
  }
  const clashes = RingClash.findClashes(clashEntries, 3);
  clashCount = clashes.length;
  clashKeys = new Set();          // `${ring}|${sparId}` of every clashing bout
  clashTips = new Map();          // `${ring}|${sparId}` → tooltip line
  for (const c of clashes) {
    for (const [self, other] of [[c.a, c.b], [c.b, c.a]]) {
      const key = `${self.ring}|${self.sparId}`;
      clashKeys.add(key);
      const note = `⚠ ${c.name} also in ${other.ring} at ${fmtTime(other.start)} (${c.type})`;
      clashTips.set(key, clashTips.has(key) ? clashTips.get(key) + '\n' + note : note);
    }
  }

  // Consecutive-slot warning: a fighter appearing in slot i and slot i+1 (position
  // across ring queues) has no rest slot between bouts — flag whether the two bouts
  // are in the same ring (back-to-back) or different rings (consecutive slots).
  consecKeys = new Set();
  consecTips = new Map();
  const bySlotFighter = new Map();   // fighter id → [{ slotIdx, ring, sparId, name }]
  for (const ringId of ['R1', 'R2', 'R3', 'R4', 'R5']) {
    state[ringId].forEach((bout, slotIdx) => {
      for (const m of GroupUtils.membersOf(bout)) {
        if (!bySlotFighter.has(m.id)) bySlotFighter.set(m.id, []);
        bySlotFighter.get(m.id).push({ slotIdx, ring: ringId, sparId: bout.sparId, name: m.name });
      }
    });
  }
  const consecFighters = new Set();   // distinct fighter ids with a back-to-back pair
  for (const [fid, appts] of bySlotFighter) {
    appts.sort((p, q) => p.slotIdx - q.slotIdx);
    for (let i = 0; i < appts.length; i++) {
      for (let j = i + 1; j < appts.length; j++) {
        if (appts[j].slotIdx - appts[i].slotIdx !== 1) continue;   // only adjacent slots
        consecFighters.add(fid);
        for (const [self, other] of [[appts[i], appts[j]], [appts[j], appts[i]]]) {
          const key = `${self.ring}|${self.sparId}`;
          consecKeys.add(key);
          const where = self.ring === other.ring ? 'same ring' : other.ring;
          const note = `⚠ ${self.name} in back-to-back slots ${appts[i].slotIdx + 1} & ${appts[j].slotIdx + 1} (${where})`;
          consecTips.set(key, consecTips.has(key) ? consecTips.get(key) + '\n' + note : note);
        }
      }
    }
  }
  consecCount = consecFighters.size;

  // Determine grid height (latest finish + a 15-min tail)
  let endMins = TEA_TIME;
  for (const bouts of Object.values(state)) {
    if (bouts.length) endMins = Math.max(endMins, bouts[bouts.length - 1].endMinutes);
  }
  endMins += 15;
  const colHeight = topPx(endMins) + 40;

  const rings = document.getElementById('rings');
  rings.innerHTML = '';

  // Tea-time line + label (span all columns inside #rings)
  const teaLine = document.createElement('div');
  teaLine.id = 'tea-line';
  teaLine.style.top = topPx(TEA_TIME) + 'px';
  rings.appendChild(teaLine);

  const teaLabel = document.createElement('div');
  teaLabel.id = 'tea-label';
  teaLabel.style.top = (topPx(TEA_TIME) - 16) + 'px';
  teaLabel.textContent = '18:00 — Tea Time';
  rings.appendChild(teaLabel);

  ['R1', 'R2', 'R3', 'R4', 'R5'].forEach(ringId => {
    const bouts    = state[ringId];
    const lastBout = bouts[bouts.length - 1];
    const overrun  = lastBout ? lastBout.endMinutes > TEA_TIME : false;

    const col = document.createElement('div');
    col.className = 'ring-col';
    col.dataset.ring = ringId;
    col.style.height = colHeight + 'px';

    // Sticky header
    const hdr = document.createElement('div');
    hdr.className = 'ring-col-header';
    hdr.innerHTML = `
      <h2>${ringId}${ringId === 'R5' ? ' <small class="ring-subtitle">(S/J/F)</small>' : ''}</h2>
      <div class="hdr-info">${bouts.length} bout${bouts.length !== 1 ? 's' : ''}</div>
      <div class="hdr-finish ${overrun ? 'over' : 'ok'}">${overrun ? '⚠' : '✓'} ${lastBout ? lastBout.endTime : '—'}</div>
    `;
    col.appendChild(hdr);

    // Hour grid lines
    for (let m = START_MINS; m <= endMins; m += 60) {
      const line = document.createElement('div');
      line.className = 'hour-line';
      line.style.top = topPx(m) + 'px';
      col.appendChild(line);
    }

    // Column-level drop handlers (time-based)
    col.addEventListener('dragover', e => {
      if (!dragged) return;
      e.preventDefault();
      const allowed = ringId !== 'R5' || canPlaceInR5(dragged.bout);
      col.classList.toggle('drag-over',  allowed);
      col.classList.toggle('drag-block', !allowed);

      const pinnedStart = yToMins(e.clientY, col);
      dropTarget = { ringId, pinnedStart };

      // Indicator: horizontal line + time label at the drop Y
      clearDropIndicators();
      if (allowed) {
        const line = document.createElement('div');
        line.className = 'drop-line';
        line.style.top = topPx(pinnedStart) + 'px';
        col.appendChild(line);

        const label = document.createElement('div');
        label.className = 'drop-time-label';
        label.style.top = topPx(pinnedStart) + 'px';
        label.textContent = fmtTime(pinnedStart);
        col.appendChild(label);
      }
    });

    col.addEventListener('dragleave', e => {
      if (!col.contains(e.relatedTarget)) {
        col.classList.remove('drag-over', 'drag-block');
        clearDropIndicators();
      }
    });

    col.addEventListener('drop', e => {
      e.preventDefault();
      col.classList.remove('drag-over', 'drag-block');
      clearDropIndicators();
      if (!dragged) return;

      const { bout, fromRing } = dragged;

      if (ringId === 'R5' && !canPlaceInR5(bout)) {
        showToast(`⚠ ${bout.red.name} (senior male) cannot be placed in R5`);
        return;
      }

      const pinnedStart = dropTarget?.ringId === ringId
        ? dropTarget.pinnedStart
        : yToMins(e.clientY, col);

      // Remove from source ring
      state[fromRing] = state[fromRing].filter(b => b.sparId !== bout.sparId);

      // Apply the pin
      bout.pinnedStart = pinnedStart;

      // Insert at the chronological index in the target ring
      const dest = state[ringId];
      let insertIdx = dest.length;
      for (let i = 0; i < dest.length; i++) {
        const otherStart = dest[i].pinnedStart ?? dest[i].startMinutes;
        if (otherStart >= pinnedStart) { insertIdx = i; break; }
      }
      dest.splice(insertIdx, 0, bout);

      // Clear time pins so all bouts pack sequentially — no gaps after a move
      state[fromRing].forEach(b => { b.pinnedStart = null; });
      if (fromRing !== ringId) state[ringId].forEach(b => { b.pinnedStart = null; });

      render(state);
      updateStats(state);
    });

    // Bout blocks (DnD wired)
    bouts.forEach((bout, idx) => {
      const block = document.createElement('div');
      block.className = `bout-block ${boutType(bout)}`;
      block.draggable = true;
      block.style.top    = topPx(bout.startMinutes) + 'px';
      block.style.height = (bout.duration * PX_PER_MIN) + 'px';
      block.dataset.find = GroupUtils.membersOf(bout).map(b => `${b.name} ${b.club}`).join(' ').toLowerCase();
      block.innerHTML = boutHTML(bout);

      // Flag cross-ring double-bookings (see render(): clashKeys/clashTips)
      const clashKey = `${ringId}|${bout.sparId}`;
      const isClash = clashKeys.has(clashKey);
      if (isClash) block.classList.add('clash');
      // Flag consecutive-slot (back-to-back) appearances (see render(): consecKeys/consecTips)
      const isConsec = consecKeys.has(clashKey);
      if (isConsec) block.classList.add('consec');

      block.addEventListener('dragstart', e => {
        dragged = { bout, fromRing: ringId };
        block.classList.add('dragging');
        if (e.dataTransfer) e.dataTransfer.effectAllowed = 'move';
      });
      block.addEventListener('dragend', () => {
        dragged = null;
        block.classList.remove('dragging');
        clearDropIndicators();
        document.querySelectorAll('.ring-col.drag-over, .ring-col.drag-block')
          .forEach(c => c.classList.remove('drag-over', 'drag-block'));
      });
      block.title = (isClash ? clashTips.get(clashKey) + '\n\n' : '') +
                    (isConsec ? consecTips.get(clashKey) + '\n\n' : '') + 'Right-click for bout options';
      block.addEventListener('contextmenu', e => {
        e.preventDefault();
        showBoutMenu(e, bout, ringId, state, () => { render(state); updateStats(state); });
      });
      col.appendChild(block);
    });

    rings.appendChild(col);
  });

  buildRuler(endMins);
  applySearch();  // re-dim non-matching bouts after any re-render (e.g. a drag)
}

// Dim bout blocks whose boxers/clubs don't match the search term. The grid is
// time-positioned, so we dim rather than filter — removing blocks would leave holes.
function applySearch() {
  const term = document.getElementById('searchInput').value.toLowerCase().trim();
  document.querySelectorAll('.bout-block').forEach(block => {
    block.classList.toggle('search-dim', term !== '' && !block.dataset.find.includes(term));
  });
}

function updateStats(state) {
  const total    = Object.values(state).reduce((n, r) => n + r.length, 0);
  const maxSlots = Math.max(...Object.values(state).map(r => r.length));

  const latestMins = Math.max(
    ...Object.values(state).map(r => r.length ? r[r.length - 1].endMinutes : START_MINS)
  );
  const latestLabel = fmtTime(latestMins);
  const overrun     = latestMins > TEA_TIME;

  document.getElementById('stats').innerHTML =
    `${total} bouts &nbsp;·&nbsp; ${maxSlots} slots &nbsp;·&nbsp; ` +
    `<span class="${overrun ? 'status-overrun' : 'status-ok'}">` +
    `${overrun ? '⚠' : '✓'} Latest finish ${latestLabel}</span>` +
    (clashCount ? ` &nbsp;·&nbsp; <span class="clash-warn">⚠ ${clashCount} clash${clashCount !== 1 ? 'es' : ''}</span>` : '') +
    (consecCount ? ` &nbsp;·&nbsp; <span class="consec-warn">⚠ ${consecCount} back-to-back</span>` : '');
}

// ── Save ──────────────────────────────────────────────────────────────────────

async function saveToServer(state) {
  const rings = ['R1', 'R2', 'R3', 'R4', 'R5'];
  const maxSlots = Math.max(...rings.map(r => state[r].length));
  const slots = [];
  for (let i = 0; i < maxSlots; i++) {
    const bouts = [];
    for (const ring of rings) {
      const b = state[ring][i];
      if (b) bouts.push({ ring, sparId: b.sparId, category: b.category,
                          red: b.red, blue: b.blue,
                          ...(b.third ? { third: b.third } : {}),
                          ...(b.extra && b.extra.length ? { extra: b.extra } : {}),
                          weightDiff: b.weightDiff });
    }
    slots.push({ slot: i + 1, bouts });
  }
  const total   = Object.values(state).reduce((n, r) => n + r.length, 0);
  const payload = { summary: { strategy: 'MANUAL', totalMatches: total }, slots };
  try {
    await DataClient.save('schedule', payload);
    showToast('✓ Saved to server');
  } catch {
    const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'schedule_grouped.json';
    a.click();
    showToast('Server unavailable — downloaded schedule_grouped.json');
  }
}

// ── Export ────────────────────────────────────────────────────────────────────

function exportAllocation(state) {
  const rings = ['R1', 'R2', 'R3', 'R4', 'R5'];

  // Rebuild slots from current ring state
  const maxSlots = Math.max(...rings.map(r => state[r].length));
  const slots = [];

  for (let i = 0; i < maxSlots; i++) {
    const bouts = [];
    for (const ring of rings) {
      const b = state[ring][i];
      if (b) bouts.push({ ring, sparId: b.sparId, category: b.category,
                          red: b.red, blue: b.blue,
                          ...(b.third ? { third: b.third } : {}),
                          ...(b.extra && b.extra.length ? { extra: b.extra } : {}),
                          weightDiff: b.weightDiff });
    }
    slots.push({ slot: i + 1, bouts });
  }

  const flat = slots.flatMap(s =>
    s.bouts.map(b => ({
      slot: s.slot, ring: b.ring, sparId: b.sparId, category: b.category,
      red:  `${b.red.name} (${b.red.club})`,
      blue: `${b.blue.name} (${b.blue.club})`,
      ...(b.third ? { third: `${b.third.name} (${b.third.club})` } : {}),
      ...(b.extra && b.extra.length ? { extra: b.extra.map(x => `${x.name} (${x.club})`) } : {}),
      weightDiff: b.weightDiff
    }))
  );

  const blob = new Blob([JSON.stringify({ slots, allocations: flat }, null, 2)],
                        { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'spar_allocation_manual.json';
  a.click();
  showToast('✓ Exported spar_allocation_manual.json');
}

// ── Toast ─────────────────────────────────────────────────────────────────────

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

// ── Add Bout ───────────────────────────────────────────────────────────────────
// Insert a last-minute pairing into a ring after Assign Rings has run, without
// re-running the allocator (which would re-flow and wipe the manual layout).
// Writes into the in-memory ring state only; persisted by Save like any drag.

const RINGS = ['R1', 'R2', 'R3', 'R4', 'R5'];
let abRoster = null;                          // fit-roster cache (DataClient boxers)
let abRosterPromise = null;                   // in-flight load, so concurrent opens share one fetch
let abPick   = { red: null, blue: null, third: null };
let abState  = null;                          // ring state to add into (set on open)
let abOnAdded = null;

const cap = s => s[0].toUpperCase() + s.slice(1);

// A boxer is "not fit" only when explicitly marked so; blank/unknown → fit.
function abIsFit(b) {
  const s = String(b && b.fit != null ? b.fit : '').trim().toLowerCase();
  return !(s === 'no' || s === 'n' || s === 'false' || s === '0');
}

// Load the fit roster once and cache it. Preloaded at boot so the first search is
// instant; dedupes concurrent callers; clears the promise on failure so it retries.
function abEnsureRoster() {
  if (abRoster) return Promise.resolve(abRoster);
  if (!abRosterPromise) {
    abRosterPromise = DataClient.get('boxers')
      .then(list => { abRoster = list.filter(abIsFit); return abRoster; })
      .catch(err => { abRosterPromise = null; throw err; });
  }
  return abRosterPromise;
}

// Best-effort bucket label from age group + experience tier; user can override.
function abDeriveCategory(b) {
  if (!b) return '';
  if (b.gender === 'female') return 'Female';
  const ag = AGE_GROUPS.find(a => a.yobMin !== null ? (b.yob >= a.yobMin && b.yob <= a.yobMax) : (b.yob <= a.yobMax))
           || AGE_GROUPS[AGE_GROUPS.length - 1];
  const exp = Number(b.experience ?? b.bouts ?? 0);
  const tier = EXPERIENCE_TIERS.find(t => exp >= t.min && exp <= t.max) || EXPERIENCE_TIERS[0];
  return `${ag.key}_${tier.key}`;
}

function abNextSparId(state) {
  let max = 0;
  for (const r of RINGS) for (const b of state[r]) {
    const m = /^M(\d+)$/.exec(b.sparId || '');
    if (m) max = Math.max(max, +m[1]);
  }
  return 'M' + (max + 1);
}

function abWeightDiff(members) {
  let mx = 0;
  for (let i = 0; i < members.length; i++)
    for (let j = i + 1; j < members.length; j++)
      mx = Math.max(mx, Math.abs(members[i].weight - members[j].weight));
  return mx.toFixed(2);
}

// Earliest-finishing ring (empty rings win) — but never default to R5 for an
// R5-ineligible bout.
function abDefaultRing(state, eligibleR5) {
  let best = 'R1', bestEnd = Infinity;
  for (const r of RINGS) {
    if (r === 'R5' && !eligibleR5) continue;
    const arr = state[r];
    const end = arr.length ? arr[arr.length - 1].endMinutes : START_MINS;
    if (end < bestEnd) { bestEnd = end; best = r; }
  }
  return best;
}

// Shared roster picker: filter fit roster by term, excluding ids already chosen,
// and paint a results dropdown. `onPick(boxer)` fires when a row is clicked.
function abPopulateResults(results, term, excludeIds, onPick) {
  const list = (abRoster || [])
    .filter(b => !excludeIds.has(b.id))
    .filter(b => !term || `${b.name} ${b.club}`.toLowerCase().includes(term))
    .slice(0, 40);
  if (!list.length) { results.classList.remove('open'); results.innerHTML = ''; return; }
  results.innerHTML = list.map(b =>
    `<div class="ab-result" data-id="${b.id}">${b.name} <small>· ${b.club} · ${b.weight}kg · ${b.gender}</small></div>`
  ).join('');
  results.classList.add('open');
  results.querySelectorAll('.ab-result').forEach(el => {
    el.onclick = () => onPick(abRoster.find(b => b.id === Number(el.dataset.id)));
  });
}

function abRenderResults(kind) {
  const input   = document.getElementById('ab' + cap(kind) + 'Search');
  const results = document.getElementById('ab' + cap(kind) + 'Results');
  const takenIds = new Set(['red', 'blue', 'third']
    .filter(k => k !== kind && abPick[k])
    .map(k => abPick[k].id));
  abPopulateResults(results, input.value.trim().toLowerCase(), takenIds, boxer => {
    abPick[kind] = boxer;
    input.value = '';
    results.classList.remove('open');
    abRenderChip(kind);
    if (kind === 'red') abSetCategoryDefault();
    abRefreshRingOptions();
    abUpdateConfirm();
  });
}

function abRenderChip(kind) {
  const box = document.getElementById('ab' + cap(kind) + 'Picked');
  const b = abPick[kind];
  if (!b) { box.innerHTML = ''; return; }
  box.innerHTML = `<span class="chip">${b.name} <small>${b.weight}kg</small> <button type="button">&times;</button></span>`;
  box.querySelector('button').onclick = () => {
    abPick[kind] = null;
    abRenderChip(kind);
    abRefreshRingOptions();
    abUpdateConfirm();
  };
}

function abSetCategoryDefault() {
  const sel = document.getElementById('abCategory');
  const derived = abDeriveCategory(abPick.red);
  if (derived && !Array.from(sel.options).some(o => o.value === derived)) {
    sel.add(new Option(derived, derived));
  }
  if (derived) sel.value = derived;
}

function abRefreshRingOptions() {
  const sel = document.getElementById('abRing');
  const members = [abPick.red, abPick.blue, abPick.third].filter(Boolean);
  const eligibleR5 = members.length > 0 &&
    members.every(b => b.gender === 'female' || (b.gender === 'male' && b.yob >= R5_ELIGIBLE_YOB_MIN));
  const prev = sel.value;
  sel.innerHTML = RINGS.map(r => {
    const disabled = r === 'R5' && !eligibleR5;
    return `<option value="${r}"${disabled ? ' disabled' : ''}>${r}${disabled ? ' (S/J/F only)' : ''}</option>`;
  }).join('');
  const def = abDefaultRing(abState, eligibleR5);
  sel.value = (prev && !sel.querySelector(`option[value="${prev}"]`)?.disabled) ? prev : def;
}

function abUpdateConfirm() {
  document.getElementById('abConfirm').disabled = !(abPick.red && abPick.blue);
}

function openAddBout(state, onAdded) {
  abState = state; abOnAdded = onAdded;
  abPick = { red: null, blue: null, third: null };
  ['red', 'blue', 'third'].forEach(k => {
    document.getElementById('ab' + cap(k) + 'Search').value = '';
    document.getElementById('ab' + cap(k) + 'Results').classList.remove('open');
    abRenderChip(k);
  });
  // Category options: distinct categories already in the schedule.
  const cats = [...new Set(RINGS.flatMap(r => state[r].map(b => b.category)).filter(Boolean))].sort();
  document.getElementById('abCategory').innerHTML =
    cats.map(c => `<option value="${c}">${c}</option>`).join('');
  abRefreshRingOptions();
  abUpdateConfirm();
  document.getElementById('addBoutModal').classList.add('open');
  document.getElementById('abRedSearch').focus();
}

function closeAddBout() {
  document.getElementById('addBoutModal').classList.remove('open');
}

function confirmAddBout() {
  if (!(abPick.red && abPick.blue)) return;
  const ringId   = document.getElementById('abRing').value;
  const category = document.getElementById('abCategory').value || abDeriveCategory(abPick.red);
  const members  = [abPick.red, abPick.blue, abPick.third].filter(Boolean);

  if (ringId === 'R5') {
    const ok = members.every(b => b.gender === 'female' || (b.gender === 'male' && b.yob >= R5_ELIGIBLE_YOB_MIN));
    if (!ok) { showToast('⚠ R5 is Schools/Junior/Female only'); return; }
  }

  const bout = { ring: ringId, sparId: abNextSparId(abState), category, red: abPick.red, blue: abPick.blue };
  if (abPick.third) bout.third = abPick.third;
  bout.weightDiff = abWeightDiff(members);

  abState[ringId].push(bout);   // append; packs after the ring's last bout
  closeAddBout();
  if (abOnAdded) abOnAdded();
  showToast(`✓ Added ${abPick.red.name} vs ${abPick.blue.name} to ${ringId} — drag to position, then Save`);
}

// Static wiring (independent of which schedule is loaded)
['red', 'blue', 'third'].forEach(kind => {
  const input   = document.getElementById('ab' + cap(kind) + 'Search');
  const results = document.getElementById('ab' + cap(kind) + 'Results');
  input.addEventListener('input', () => abRenderResults(kind));
  input.addEventListener('focus', () => abRenderResults(kind));
  input.addEventListener('keydown', e => { if (e.key === 'Escape') results.classList.remove('open'); });
});
document.addEventListener('click', e => {
  document.querySelectorAll('.ab-results.open').forEach(r => {
    if (!r.closest('.ab-field').contains(e.target)) r.classList.remove('open');
  });
});
document.getElementById('abCancel').onclick = closeAddBout;
document.getElementById('abConfirm').onclick = confirmAddBout;
document.getElementById('addBoutModal').addEventListener('click', e => {
  if (e.target.id === 'addBoutModal') closeAddBout();
});

// ── Add fighter to an existing bout ─────────────────────────────────────────────
// Right-click a bout block → drop one more fit fighter into it. A pair becomes a
// trio, a trio a 4-way group, etc. (round-robin via GroupUtils). Schedule-only,
// persisted by Save like any other edit.

let a2bBout = null, a2bRing = null, a2bOnDone = null, a2bPick = null;

function a2bRenderResults() {
  const input   = document.getElementById('a2bSearch');
  const results  = document.getElementById('a2bResults');
  const inBout = new Set(GroupUtils.membersOf(a2bBout).map(b => b.id));
  abPopulateResults(results, input.value.trim().toLowerCase(), inBout, boxer => {
    a2bPick = boxer;
    input.value = '';
    results.classList.remove('open');
    a2bRenderChip();
    document.getElementById('a2bConfirm').disabled = false;
  });
}

function a2bRenderChip() {
  const box = document.getElementById('a2bPicked');
  if (!a2bPick) { box.innerHTML = ''; return; }
  box.innerHTML = `<span class="chip">${a2bPick.name} <small>${a2bPick.weight}kg</small> <button type="button">&times;</button></span>`;
  box.querySelector('button').onclick = () => {
    a2bPick = null;
    a2bRenderChip();
    document.getElementById('a2bConfirm').disabled = true;
  };
}

function openAddToBout(bout, ringId, onDone) {
  a2bBout = bout; a2bRing = ringId; a2bOnDone = onDone; a2bPick = null;
  const names = GroupUtils.membersOf(bout).map(b => b.name).join(', ');
  document.getElementById('a2bTitle').textContent = `Add Fighter to Bout — ${names}`;
  document.getElementById('a2bSearch').value = '';
  document.getElementById('a2bResults').classList.remove('open');
  document.getElementById('a2bPicked').innerHTML = '';
  document.getElementById('a2bConfirm').disabled = true;
  document.getElementById('addToBoutModal').classList.add('open');
  document.getElementById('a2bSearch').focus();
}

function closeAddToBout() { document.getElementById('addToBoutModal').classList.remove('open'); }

function confirmAddToBout() {
  if (!a2bPick) return;
  if (a2bRing === 'R5') {
    const ok = a2bPick.gender === 'female' || (a2bPick.gender === 'male' && a2bPick.yob >= R5_ELIGIBLE_YOB_MIN);
    if (!ok) { showToast('⚠ R5 is Schools/Junior/Female only'); return; }
  }
  const members = GroupUtils.membersOf(a2bBout);
  members.push(a2bPick);
  GroupUtils.setMembers(a2bBout, members);      // 2→third, 3→extra[0], …
  a2bBout.weightDiff = abWeightDiff(members);
  const name = a2bPick.name;
  closeAddToBout();
  if (a2bOnDone) a2bOnDone();
  showToast(`✓ Added ${name} — now a ${members.length}-boxer group`);
}

document.getElementById('a2bSearch').addEventListener('input', a2bRenderResults);
document.getElementById('a2bSearch').addEventListener('focus', a2bRenderResults);
document.getElementById('a2bSearch').addEventListener('keydown', e => {
  if (e.key === 'Escape') document.getElementById('a2bResults').classList.remove('open');
});
document.getElementById('a2bCancel').onclick = closeAddToBout;
document.getElementById('a2bConfirm').onclick = confirmAddToBout;
document.getElementById('addToBoutModal').addEventListener('click', e => {
  if (e.target.id === 'addToBoutModal') closeAddToBout();
});

// ── Right-click bout menu ───────────────────────────────────────────────────────
// Options: add a fighter, remove any one fighter, or delete the whole bout. All
// edit the in-memory ring state; persisted by Save.

const escHtml = s => String(s).replace(/[&<>"]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]));

function closeBoutMenu() { const m = document.getElementById('boutMenu'); if (m) m.remove(); }

function showBoutMenu(e, bout, ringId, state, refresh) {
  closeBoutMenu();
  const members = GroupUtils.membersOf(bout);
  const menu = document.createElement('div');
  menu.id = 'boutMenu';
  menu.className = 'bout-menu';
  menu.innerHTML =
    `<button class="bm-item" data-act="add">&#43; Add fighter</button>` +
    `<div class="bm-sep"></div>` +
    members.map((m, i) =>
      `<button class="bm-item bm-remove" data-act="remove" data-idx="${i}">&#10005; Remove ${escHtml(m.name)}</button>`
    ).join('') +
    `<div class="bm-sep"></div>` +
    `<button class="bm-item bm-danger" data-act="delete">&#128465; Delete entire bout</button>`;
  document.body.appendChild(menu);

  // Keep the menu on-screen near the cursor
  menu.style.left = Math.min(e.clientX, window.innerWidth  - menu.offsetWidth  - 8) + 'px';
  menu.style.top  = Math.min(e.clientY, window.innerHeight - menu.offsetHeight - 8) + 'px';

  menu.querySelectorAll('.bm-item').forEach(btn => {
    btn.onclick = async () => {
      const act = btn.dataset.act;
      closeBoutMenu();
      if (act === 'add') {
        try { await abEnsureRoster(); }
        catch { showToast('Could not load roster'); return; }
        openAddToBout(bout, ringId, refresh);
      } else if (act === 'remove') {
        removeMemberFromBout(bout, ringId, Number(btn.dataset.idx), state, refresh);
      } else if (act === 'delete') {
        if (confirm('Delete this entire bout from the ring?')) deleteBout(bout, ringId, state, refresh);
      }
    };
  });
}

function removeMemberFromBout(bout, ringId, idx, state, refresh) {
  const members = GroupUtils.membersOf(bout);
  const removed = members.splice(idx, 1)[0];
  if (members.length >= 2) {
    GroupUtils.setMembers(bout, members);          // 3→pair, 4→trio, …
    bout.weightDiff = abWeightDiff(members);
    refresh();
    showToast(`✓ Removed ${removed.name} — now a ${members.length}-boxer ${members.length > 2 ? 'group' : 'bout'}`);
  } else {
    // A single fighter isn't a bout — drop the whole thing.
    state[ringId] = state[ringId].filter(b => b !== bout);
    refresh();
    showToast(`✓ Removed ${removed.name} — bout deleted (needs 2+ fighters)`);
  }
}

function deleteBout(bout, ringId, state, refresh) {
  state[ringId] = state[ringId].filter(b => b !== bout);
  refresh();
  showToast('✓ Bout deleted');
}

document.addEventListener('click', closeBoutMenu);
document.addEventListener('scroll', closeBoutMenu, true);
window.addEventListener('resize', closeBoutMenu);
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeBoutMenu(); });

// ── Boot ─────────────────────────────────────────────────────────────────────

async function bootWithSchedule() {
  let schedule = await loadSchedule();
  if (!schedule) {
    showToast('Generating ring schedule…');
    try {
      const res = await fetch('/api/generate-schedule', { method: 'POST' });
      if (!res.ok) throw new Error((await res.json().catch(() => ({}))).error || res.statusText);
      schedule = await res.json();
    } catch (e) {
      document.getElementById('rings').innerHTML =
        `<div class="empty-msg">
           <b>Could not generate schedule: ${e.message}</b><br><br>
           Go to <a href="SparManager.html" class="link-primary">Spar Manager</a> first.
         </div>`;
      return;
    }
  }
  const initialState = scheduleToState(schedule);
  let   state        = JSON.parse(JSON.stringify(initialState));

  render(state);
  updateStats(state);

  document.getElementById('resetBtn').onclick = () => {
    state = JSON.parse(JSON.stringify(initialState));
    render(state);
    updateStats(state);
    showToast('Session changes undone');
  };
  document.getElementById('saveBtn').onclick   = () => saveToServer(state);
  document.getElementById('exportBtn').onclick = () => exportAllocation(state);
  document.getElementById('searchInput').oninput = applySearch;

  document.getElementById('addBoutBtn').onclick = async () => {
    try { await abEnsureRoster(); }
    catch { showToast('Could not load roster'); return; }
    openAddBout(state, () => { render(state); updateStats(state); });
  };

  // Warm the roster cache now so the first Add-fighter search shows results instantly.
  abEnsureRoster().catch(() => { /* will retry on demand */ });
}

(async () => {
  await initDatePicker();
  await bootWithSchedule();
  dateSelect.addEventListener('change', bootWithSchedule);
})();
